name: rld-reth

services:
  reth:
    container_name: rld-reth
    image: ghcr.io/paradigmxyz/reth:v1.11.3
    entrypoint: /usr/local/bin/reth
    command:
      - node
      - --dev
      - --dev.block-time
      - "${RETH_BLOCK_TIME:-1}s"
      - --chain
      - /genesis/genesis.json
      - --datadir
      - /data
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - "eth,net,web3,txpool"
      - --http.corsdomain
      - "${RETH_HTTP_CORS_DOMAIN:-*}"
      - --gpo.maxprice
      - "1000000"
      - --log.stdout.filter
      - "info"
    volumes:
      - reth-datadir:/data
      - ./genesis.json:/genesis/genesis.json:ro
    ports:
      - "127.0.0.1:${RETH_PORT:-8545}:8545"
    restart: unless-stopped
    labels:
      com.rld.owner: "protocol-backend"
      com.rld.service: "reth-dev-node"
      com.rld.tier: "simulation"
      com.rld.persistence: "volume:reth-datadir"
      com.rld.description: "Reth dev-mode execution node for the simulation stack"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'timeout 2 bash -c \"echo > /dev/tcp/localhost/8545\"' || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 10

  postgres:
    container_name: rld-postgres
    image: postgres:15.17-alpine
    volumes:
      - postgres-data-reth:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=rld
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_DB=rld_indexer
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    labels:
      com.rld.owner: "protocol-backend"
      com.rld.service: "simulation-postgres"
      com.rld.tier: "database"
      com.rld.persistence: "volume:postgres-data-reth"
      com.rld.description: "PostgreSQL state store for the simulation indexer"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rld -d rld_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  indexer:
    container_name: rld-indexer
    image: rld-simulation-indexer:latest
    build:
      context: ../..
      dockerfile: docker/indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      reth:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://rld:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/rld_indexer
      - RPC_URL=http://reth:8545
      - DEPLOYMENT_JSON=/config/deployment.json
      - POLL_INTERVAL=${POLL_INTERVAL:-2}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - INDEXER_ADMIN_TOKEN=${INDEXER_ADMIN_TOKEN:?INDEXER_ADMIN_TOKEN must be set}
      - INDEXER_ALLOW_UNSAFE_ADMIN_RESET=${INDEXER_ALLOW_UNSAFE_ADMIN_RESET:-false}
      - INDEXER_ADMIN_INTERNAL_ONLY=${INDEXER_ADMIN_INTERNAL_ONLY:-true}
      - INDEXER_ADMIN_ALLOWED_CLIENTS=${INDEXER_ADMIN_ALLOWED_CLIENTS:-127.0.0.1,::1,localhost,172.20.0.1,172.17.0.1}
      - INDEXER_EXPOSE_INTERNAL_ERRORS=${INDEXER_EXPOSE_INTERNAL_ERRORS:-false}
      - INDEXER_CORS_ORIGINS=${INDEXER_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,https://rld.fi,https://www.rld.fi}
      - SIM_CLICKHOUSE_DUAL_WRITE=${SIM_CLICKHOUSE_DUAL_WRITE:-false}
      - SIM_CLICKHOUSE_HOST=${SIM_CLICKHOUSE_HOST:-rld_clickhouse}
      - SIM_CLICKHOUSE_PORT=${SIM_CLICKHOUSE_PORT:-8123}
      - SIM_CLICKHOUSE_DATABASE=${SIM_CLICKHOUSE_DATABASE:-default}
      - SIM_CLICKHOUSE_DUAL_WRITE_STRICT=${SIM_CLICKHOUSE_DUAL_WRITE_STRICT:-false}
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ../deployment.json:/config/deployment.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${INDEXER_PORT:-8080}:8080"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      com.rld.owner: "protocol-backend"
      com.rld.service: "simulation-indexer"
      com.rld.tier: "simulation"
      com.rld.persistence: "postgres"
      com.rld.description: "On-chain event indexer and GraphQL/REST API for simulation state"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=2)\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  mm-daemon:
    container_name: rld-mm-daemon
    image: rld-simulation-daemon:latest
    build:
      context: ../..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "services/combined_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=http://reth:8545
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${MM_KEY}
      - MM_KEY=${MM_KEY}
      - ORACLE_ADMIN_KEY=${DEPLOYER_KEY}
      - RATES_API_BASE_URL=${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}
      - API_URL=${API_URL:-${RATES_API_BASE_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}
      - ENVIO_API_URL=${ENVIO_API_URL:-${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}}
      - RATES_API_URL=${RATES_API_URL:-${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}}
      - API_KEY=${API_KEY}
      - MIN_BORROW_APY=${MIN_BORROW_APY:-0.0}
      - MAX_BORROW_APY=${MAX_BORROW_APY:-2.0}
      - MAX_RATE_AGE_SECONDS=${MAX_RATE_AGE_SECONDS:-900}
      - RATES_TIMEOUT=${RATES_TIMEOUT:-2}
      - PYTHONDONTWRITEBYTECODE=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      com.rld.owner: "protocol-backend"
      com.rld.service: "market-maker-daemon"
      com.rld.tier: "execution"
      com.rld.persistence: "none"
      com.rld.description: "Market-maker and oracle update daemon for simulation execution"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://indexer:8080/healthz', timeout=2)\""
        ]
      interval: 20s
      timeout: 5s
      start_period: 60s
      retries: 5

  chaos-trader:
    container_name: rld-chaos-trader
    image: rld-simulation-chaos-trader:latest
    build:
      context: ../..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "tools/chaos_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
      faucet:
        condition: service_healthy
    environment:
      - RPC_URL=http://reth:8545
      - INDEXER_URL=http://indexer:8080
      - FAUCET_URL=http://faucet:8088
      - PRIVATE_KEY=${CHAOS_KEY}
      - CHAOS_KEY=${CHAOS_KEY}
      - CHAOS_AUTO_FUND=${CHAOS_AUTO_FUND:-true}
      - CHAOS_AUTO_FUND_COOLDOWN_SEC=${CHAOS_AUTO_FUND_COOLDOWN_SEC:-90}
      - CHAOS_TRADE_INTERVAL_MIN=${CHAOS_TRADE_INTERVAL_MIN:-10}
      - CHAOS_TRADE_INTERVAL_MAX=${CHAOS_TRADE_INTERVAL_MAX:-15}
      - CHAOS_TRADE_PCT_MIN=${CHAOS_TRADE_PCT_MIN:-0.01}
      - CHAOS_TRADE_PCT_MAX=${CHAOS_TRADE_PCT_MAX:-0.10}
      - CHAOS_MIN_WAUSDC_FOR_BUY=${CHAOS_MIN_WAUSDC_FOR_BUY:-100}
      - CHAOS_MIN_WRLP_FOR_SELL=${CHAOS_MIN_WRLP_FOR_SELL:-1}
      - CHAOS_MIN_BUY_AMOUNT_WAUSDC=${CHAOS_MIN_BUY_AMOUNT_WAUSDC:-50}
      - CHAOS_MIN_SELL_AMOUNT_WRLP=${CHAOS_MIN_SELL_AMOUNT_WRLP:-1}
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      com.rld.owner: "protocol-backend"
      com.rld.service: "chaos-trader"
      com.rld.tier: "execution"
      com.rld.persistence: "none"
      com.rld.description: "Randomized simulation trader used to keep the market active"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from pathlib import Path; c=Path('/proc/1/cmdline').read_text(); assert 'chaos_daemon.py' in c\""]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  arb-bot:
    container_name: rld-arb-bot
    image: rld-simulation-arb-bot:latest
    build:
      context: ../..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "tools/cross_market_arb.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=http://reth:8545
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${ARB_KEY:-${MM_KEY}}
      - MM_KEY=${MM_KEY}
      - WHALE_KEY=${WHALE_KEY}
      - ARB_DRY_RUN=${ARB_DRY_RUN:-true}
      - ARB_INTERVAL_SECONDS=${ARB_INTERVAL_SECONDS:-15}
      - ARB_THRESHOLD_BPS=${ARB_THRESHOLD_BPS:-75}
      - ARB_TRADE_USD=${ARB_TRADE_USD:-1000}
      - ARB_MIN_USDC=${ARB_MIN_USDC:-10000}
      - ARB_STATUS_FILE=/tmp/cross_market_arb_status.json
      - ARB_MAX_CONSECUTIVE_FAILURES=${ARB_MAX_CONSECUTIVE_FAILURES:-5}
      - PYTHONDONTWRITEBYTECODE=1
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      com.rld.owner: "protocol-backend"
      com.rld.service: "cross-market-arb-bot"
      com.rld.tier: "execution"
      com.rld.persistence: "tmp-status"
      com.rld.description: "Cross-market arbitrage bot with status-file health contract"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport json, time\np='/tmp/cross_market_arb_status.json'\nd=json.load(open(p))\nage=time.time()-int(d.get('updated_at', 0))\nassert age < 60, age\nassert int(d.get('consecutive_failures', 0)) < int(d.get('max_consecutive_failures', 5))\nPY"
        ]
      interval: 20s
      timeout: 5s
      start_period: 30s
      retries: 3

  faucet:
    container_name: rld-faucet
    image: rld-simulation-faucet:latest
    build:
      context: .
      dockerfile: Dockerfile.faucet
    depends_on:
      reth:
        condition: service_healthy
    environment:
      - WHALE_KEY=${WHALE_KEY}
      - SIMFUNDER_ADMIN_KEY=${DEPLOYER_KEY}
      - RPC_URL=http://reth:8545
      - DEPLOYMENT_FILE=/config/deployment-snapshot.json
      - FAUCET_PORT=8088
      - FAUCET_CORS_ORIGIN=${FAUCET_CORS_ORIGIN:-https://rld.fi}
      - PYTHONDONTWRITEBYTECODE=1
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - ./deployment-snapshot.json:/config/deployment-snapshot.json:ro
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      com.rld.owner: "protocol-backend"
      com.rld.service: "faucet"
      com.rld.tier: "execution"
      com.rld.persistence: "none"
      com.rld.description: "Simulation faucet for funding test accounts from configured whale key"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/health', timeout=2)\""]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres-data-reth:
    external: true
    name: reth_postgres-data-reth
  reth-datadir:
    external: true
    name: reth_reth-datadir

networks:
  default:
    name: rld_shared
    external: true
