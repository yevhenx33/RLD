# ═══════════════════════════════════════════════════════════════
# RLD Simulation Stack (Reth Mode)
# ═══════════════════════════════════════════════════════════════
# Core simulation services only. Rates-indexer and frontend run
# in separate compose files on the shared rld_shared network.
#
#  Usage:
#    ./docker/reth/restart-reth.sh --fresh --with-users
#
#  Services:
#    reth         — Reth dev-mode node with custom genesis
#    postgres     — PostgreSQL for simulation indexer
#    indexer      — On-chain event indexer + REST/GraphQL API
#    mm-daemon    — Market-maker bot
#    chaos-trader — Random trading bot
#    faucet       — Whale faucet for funding users
# ═══════════════════════════════════════════════════════════════

services:
  # ─── RETH NODE ──────────────────────────────────────────────
  reth:
    image: ghcr.io/paradigmxyz/reth:v1.11.3
    entrypoint: /usr/local/bin/reth
    command:
      - node
      - --dev
      - --dev.block-time
      - "${RETH_BLOCK_TIME:-1}s"
      - --chain
      - /genesis/genesis.json
      - --datadir
      - /data
      - --http
      - --http.addr
      - "0.0.0.0"
      - --http.port
      - "8545"
      - --http.api
      - "eth,net,web3,txpool"
      - --http.corsdomain
      - "${RETH_HTTP_CORS_DOMAIN:-http://localhost:3000,http://localhost:5173,https://rld.fi,https://www.rld.fi}"
      - --gpo.maxprice
      - "1000000"
      - --log.stdout.filter
      - "info"
    volumes:
      - reth-datadir:/data
      - ./genesis.json:/genesis/genesis.json:ro
    ports:
      - "127.0.0.1:${RETH_PORT:-8545}:8545"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'timeout 2 bash -c \"echo > /dev/tcp/localhost/8545\"' || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 10

  # ─── POSTGRES ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    volumes:
      - postgres-data-reth:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=rld
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - POSTGRES_DB=rld_indexer
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rld -d rld_indexer"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── INDEXER ─────────────────────────────────────────────────
  indexer:
    build:
      context: ../..
      dockerfile: docker/indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      reth:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://rld:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/rld_indexer
      - RPC_URL=http://reth:8545
      - DEPLOYMENT_JSON=/config/deployment.json
      - POLL_INTERVAL=${POLL_INTERVAL:-2}
      - BATCH_SIZE=${BATCH_SIZE:-100}
      - INDEXER_ADMIN_TOKEN=${INDEXER_ADMIN_TOKEN:?INDEXER_ADMIN_TOKEN must be set}
      - INDEXER_ALLOW_UNSAFE_ADMIN_RESET=${INDEXER_ALLOW_UNSAFE_ADMIN_RESET:-false}
      - INDEXER_ADMIN_INTERNAL_ONLY=${INDEXER_ADMIN_INTERNAL_ONLY:-true}
      - INDEXER_EXPOSE_INTERNAL_ERRORS=${INDEXER_EXPOSE_INTERNAL_ERRORS:-false}
      - INDEXER_CORS_ORIGINS=${INDEXER_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,https://rld.fi,https://www.rld.fi}
      - SIM_CLICKHOUSE_DUAL_WRITE=${SIM_CLICKHOUSE_DUAL_WRITE:-false}
      - SIM_CLICKHOUSE_HOST=${SIM_CLICKHOUSE_HOST:-host.docker.internal}
      - SIM_CLICKHOUSE_PORT=${SIM_CLICKHOUSE_PORT:-8123}
      - SIM_CLICKHOUSE_DATABASE=${SIM_CLICKHOUSE_DATABASE:-default}
      - SIM_CLICKHOUSE_DUAL_WRITE_STRICT=${SIM_CLICKHOUSE_DUAL_WRITE_STRICT:-false}
    volumes:
      - ../deployment.json:/config/deployment.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${INDEXER_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=2)\""]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ─── MM DAEMON ───────────────────────────────────────────────
  mm-daemon:
    build:
      context: ../..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "services/combined_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
    environment:
      - RPC_URL=http://reth:8545
      - INDEXER_URL=http://indexer:8080
      - PRIVATE_KEY=${MM_KEY}
      - MM_KEY=${MM_KEY}
      - ORACLE_ADMIN_KEY=${DEPLOYER_KEY}
      - RATES_API_BASE_URL=${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}
      - API_URL=${API_URL:-${RATES_API_BASE_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}
      - ENVIO_API_URL=${ENVIO_API_URL:-${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}}
      - RATES_API_URL=${RATES_API_URL:-${RATES_API_BASE_URL:-${API_URL:-http://host.docker.internal:${RATES_API_PORT:-5000}}}}
      - API_KEY=${API_KEY}
      - MIN_BORROW_APY=${MIN_BORROW_APY:-0.0}
      - MAX_BORROW_APY=${MAX_BORROW_APY:-2.0}
      - MAX_RATE_AGE_SECONDS=${MAX_RATE_AGE_SECONDS:-900}
      - RATES_TIMEOUT=${RATES_TIMEOUT:-2}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://indexer:8080/healthz', timeout=2)\""
        ]
      interval: 20s
      timeout: 5s
      start_period: 60s
      retries: 5

  # ─── CHAOS TRADER ────────────────────────────────────────────
  chaos-trader:
    build:
      context: ../..
      dockerfile: docker/daemons/Dockerfile
    command: ["python", "tools/chaos_daemon.py"]
    depends_on:
      indexer:
        condition: service_healthy
      faucet:
        condition: service_healthy
    environment:
      - RPC_URL=http://reth:8545
      - INDEXER_URL=http://indexer:8080
      - FAUCET_URL=http://faucet:8088
      - PRIVATE_KEY=${CHAOS_KEY}
      - CHAOS_KEY=${CHAOS_KEY}
      - CHAOS_AUTO_FUND=${CHAOS_AUTO_FUND:-true}
      - CHAOS_AUTO_FUND_COOLDOWN_SEC=${CHAOS_AUTO_FUND_COOLDOWN_SEC:-90}
      - CHAOS_TRADE_INTERVAL_MIN=${CHAOS_TRADE_INTERVAL_MIN:-10}
      - CHAOS_TRADE_INTERVAL_MAX=${CHAOS_TRADE_INTERVAL_MAX:-15}
      - CHAOS_TRADE_PCT_MIN=${CHAOS_TRADE_PCT_MIN:-0.01}
      - CHAOS_TRADE_PCT_MAX=${CHAOS_TRADE_PCT_MAX:-0.10}
      - CHAOS_MIN_WAUSDC_FOR_BUY=${CHAOS_MIN_WAUSDC_FOR_BUY:-100}
      - CHAOS_MIN_WRLP_FOR_SELL=${CHAOS_MIN_WRLP_FOR_SELL:-1}
      - CHAOS_MIN_BUY_AMOUNT_WAUSDC=${CHAOS_MIN_BUY_AMOUNT_WAUSDC:-50}
      - CHAOS_MIN_SELL_AMOUNT_WRLP=${CHAOS_MIN_SELL_AMOUNT_WRLP:-1}
    restart: unless-stopped

  # ─── FAUCET SERVER ────────────────────────────────────────────
  faucet:
    build:
      context: .
      dockerfile: Dockerfile.faucet
    depends_on:
      reth:
        condition: service_healthy
    environment:
      - WHALE_KEY=${WHALE_KEY}
      - SIMFUNDER_ADMIN_KEY=${DEPLOYER_KEY}
      - RPC_URL=http://reth:8545
      - DEPLOYMENT_FILE=/config/deployment-snapshot.json
      - FAUCET_PORT=8088
      - FAUCET_CORS_ORIGIN=${FAUCET_CORS_ORIGIN:-https://rld.fi}
    ports:
      - "127.0.0.1:8088:8088"
    volumes:
      - ./deployment-snapshot.json:/config/deployment-snapshot.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/health', timeout=2)\""]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  postgres-data-reth:
  reth-datadir:

networks:
  default:
    name: rld_shared
    external: true
