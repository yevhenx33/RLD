name: rld-infra

services:
  monitor-bot:
    container_name: rld-monitor-bot
    image: rld-monitor-bot:latest
    build:
      context: ..
      dockerfile: backend/Dockerfile.bot
    ports:
      - "127.0.0.1:8083:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - RATES_API_BASE_URL=${RATES_API_BASE_URL:-http://rld_graphql_api:5000}
      - RATES_API_URL=${RATES_API_URL:-http://rld_graphql_api:5000}
      - API_URL=${API_URL:-http://rld_graphql_api:5000}
      - MAINNET_RPC_URL=${BOT_RPC_URL:-https://eth.llamarpc.com}
      - API_KEY=${API_KEY:-}
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - bot-data:/data
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      com.rld.owner: "protocol-ops"
      com.rld.service: "monitor-bot"
      com.rld.tier: "infra"
      com.rld.persistence: "volume:bot-data"
      com.rld.description: "Telegram monitor and alert bot for RLD runtime health"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  bot-data:
    external: true
    name: rld_monitor_bot_data

networks:
  default:
    name: rld_shared
    external: true
