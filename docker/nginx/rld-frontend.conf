# RLD Frontend — Reverse Proxy
# Cloudflare → port 443 (HTTPS) → frontend container :3000
# Dashboard is served separately via :8090 and mounted at /dashboard/
limit_req_zone $binary_remote_addr zone=rld_analytics_graphql:10m rate=60r/m;

server {
    listen 80;
    listen 443 ssl;
    server_name rld.fi *.rld.fi;

    ssl_certificate /etc/nginx/ssl/rld.crt;
    ssl_certificate_key /etc/nginx/ssl/rld.key;

    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /analytics/graphql {
        limit_req zone=rld_analytics_graphql burst=30 nodelay;
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:5000/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
    }

    location /analytics/envio-graphql {
        limit_req zone=rld_analytics_graphql burst=30 nodelay;
        client_max_body_size 256k;
        proxy_pass http://127.0.0.1:5000/envio-graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
    }

    location /analytics/public-readyz {
        proxy_pass http://127.0.0.1:5000/public-readyz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /analytics/readyz {
        proxy_pass http://127.0.0.1:5000/public-readyz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /analytics/status {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:5000/status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    location /analytics/metrics {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:5000/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
