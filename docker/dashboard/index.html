<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RLD // INFRA STATUS</title>
    <script src="vendor/react.min.js?v=dashboard-20260504"></script>
    <script src="vendor/react-dom.min.js?v=dashboard-20260504"></script>
    <script src="vendor/babel.min.js?v=dashboard-20260504"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #06080a;
        --s1: #0c0e12;
        --s2: #12151a;
        --s3: #181c22;
        --bdr: #1c2028;
        --bdr2: #252a33;
        --g: #00ff88;
        --gd: #00cc6a;
        --g10: rgba(0, 255, 136, 0.06);
        --g20: rgba(0, 255, 136, 0.12);
        --a: #ffb020;
        --ad: #cc8800;
        --a10: rgba(255, 176, 32, 0.06);
        --a20: rgba(255, 176, 32, 0.12);
        --r: #ff4455;
        --rd: #cc2233;
        --r10: rgba(255, 68, 85, 0.06);
        --r20: rgba(255, 68, 85, 0.12);
        --c: #38bdf8;
        --cd: #0ea5e9;
        --c10: rgba(56, 189, 248, 0.06);
        --p: #a78bfa;
        --p10: rgba(167, 139, 250, 0.06);
        --t: #8892a0;
        --td: #4a5260;
        --tb: #d0d5dd;
        --tw: #f0f2f5;
      }
      html {
        font-size: 13px;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        color: var(--t);
        min-height: 100vh;
        line-height: 1.5;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 136, 0.004) 2px,
          rgba(0, 255, 136, 0.004) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }
      ::selection {
        background: var(--g20);
        color: var(--g);
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .wrap {
        max-width: 1440px;
        margin: 0 auto;
        padding: 12px 16px;
      }

      /* ── Header ── */
      .hdr {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0 14px;
        border-bottom: 1px solid var(--bdr);
        margin-bottom: 12px;
      }
      .hdr-l {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .hdr-r {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo {
        font-size: 16px;
        font-weight: 700;
        color: var(--g);
        text-shadow: 0 0 12px rgba(0, 255, 136, 0.25);
      }
      .subtitle {
        font-size: 10px;
        color: var(--td);
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* ── Grid ── */
      .grid {
        display: grid;
        gap: 1px;
      }
      .g2 {
        grid-template-columns: 1fr 1fr;
      }
      .g3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .g4 {
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
      .g5 {
        grid-template-columns: repeat(5, 1fr);
      }
      .g23 {
        grid-template-columns: 2fr 3fr;
      }
      .g32 {
        grid-template-columns: 3fr 2fr;
      }
      @media (max-width: 600px) {
        .g2,
        .g3,
        .g4,
        .g5,
        .g23,
        .g32 {
          grid-template-columns: 1fr;
        }
      }

      /* ── Card ── */
      .card {
        background: var(--s1);
        border: 1px solid var(--bdr);
        padding: 12px 14px;
        animation: fadeUp 0.35s ease both;
      }
      .card-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--td);
      }
      .card-hdr .label {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* ── Badge ── */
      .badge {
        font-size: 8px;
        padding: 2px 7px;
        border-radius: 2px;
        letter-spacing: 1.2px;
        font-weight: 600;
        white-space: nowrap;
      }
      .b-g {
        background: var(--g10);
        color: var(--g);
        border: 1px solid var(--g20);
      }
      .b-a {
        background: var(--a10);
        color: var(--a);
        border: 1px solid var(--a20);
      }
      .b-r {
        background: var(--r10);
        color: var(--r);
        border: 1px solid var(--r20);
      }
      .b-c {
        background: var(--c10);
        color: var(--c);
        border: 1px solid rgba(56, 189, 248, 0.15);
      }

      /* ── Status Indicator ── */
      .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }
      .dg {
        background: var(--g);
        box-shadow: 0 0 5px var(--g);
      }
      .da {
        background: var(--a);
        box-shadow: 0 0 5px var(--a);
      }
      .dr {
        background: var(--r);
        box-shadow: 0 0 5px var(--r);
      }

      /* ── Table ── */
      .tbl {
        width: 100%;
        border-collapse: collapse;
      }
      .tbl th {
        text-align: left;
        color: var(--td);
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        padding: 4px 6px;
        border-bottom: 1px solid var(--bdr);
        font-weight: 400;
      }
      .tbl td {
        padding: 4px 6px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        font-size: 11px;
        white-space: nowrap;
      }
      .tbl tr:hover td {
        background: rgba(0, 255, 136, 0.01);
      }
      .tbl .r {
        text-align: right;
      }

      /* ── Bar ── */
      .bar-bg {
        height: 3px;
        background: var(--bdr);
        border-radius: 1px;
        overflow: hidden;
        flex: 1;
      }
      .bar-fg {
        height: 100%;
        border-radius: 1px;
        transition: width 0.5s ease;
      }

      /* ── Metric ── */
      .mv {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.5px;
        line-height: 1.2;
      }
      .ml {
        font-size: 8px;
        color: var(--td);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-top: 2px;
      }
      .ms {
        font-size: 10px;
        color: var(--td);
        margin-left: 2px;
        font-weight: 300;
      }

      /* ── Sparkline ── */
      .spark {
        display: flex;
        align-items: flex-end;
        gap: 1px;
        height: 24px;
      }
      .spark-bar {
        width: 3px;
        min-height: 1px;
        background: var(--g);
        opacity: 0.6;
        border-radius: 1px 1px 0 0;
        transition: height 0.3s ease;
      }
      .spark-bar:last-child {
        opacity: 1;
      }

      /* ── Log ── */
      .log {
        font-size: 10px;
        padding: 2px 0;
        display: flex;
        gap: 8px;
        animation: slideIn 0.2s ease both;
      }
      .log-ts {
        color: var(--td);
        flex-shrink: 0;
        font-size: 9px;
        min-width: 52px;
      }

      /* ── Footer ── */
      .ftr {
        text-align: center;
        padding: 10px 0;
        color: var(--td);
        font-size: 8px;
        border-top: 1px solid var(--bdr);
        margin-top: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      /* ── Tooltip ── */
      .tip {
        position: relative;
        cursor: default;
      }
      .tip:hover::after {
        content: attr(data-tip);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--s3);
        border: 1px solid var(--bdr2);
        color: var(--tb);
        padding: 3px 8px;
        font-size: 9px;
        white-space: nowrap;
        border-radius: 2px;
        z-index: 10;
        pointer-events: none;
      }

      .glow-g {
        text-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
      }
      .glow-r {
        text-shadow: 0 0 8px rgba(255, 68, 85, 0.3);
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--bdr);
      }
      .tab {
        padding: 8px 20px;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--td);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        text-decoration: none;
      }
      .tab:hover {
        color: var(--tb);
        background: rgba(255, 255, 255, 0.02);
      }
      .tab.active {
        color: var(--g);
        border-bottom-color: var(--g);
        background: rgba(0, 255, 136, 0.06);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useCallback, useRef } = React;

      // ── Utils ──
      const fmtUp = (s) => {
        if (!s) return "—";
        const d = Math.floor(s / 86400),
          h = Math.floor((s % 86400) / 3600),
          m = Math.floor((s % 3600) / 60);
        return d > 0 ? `${d}d ${h}h ${m}m` : h > 0 ? `${h}h ${m}m` : `${m}m`;
      };
      const fmtAgo = (ts) => {
        if (!ts) return "—";
        const d = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
        return d < 60
          ? `${d}s ago`
          : d < 3600
            ? `${Math.floor(d / 60)}m ago`
            : `${Math.floor(d / 3600)}h ago`;
      };
      const fmtN = (n) => {
        if (n === undefined || n === null || n === "") return "—";
        const v = Number(n);
        return isNaN(v)
          ? n
          : v >= 1e6
            ? (v / 1e6).toFixed(2) + "M"
            : v >= 1e3
              ? v.toLocaleString()
              : String(v);
      };
      const fmtAddr = (a) =>
        a && typeof a === "string" && a.startsWith("0x") && a.length >= 10
          ? `${a.slice(0, 8)}…${a.slice(-6)}`
          : "—";
      const fmtBytes = (s) => {
        if (!s) return "—";
        const m = s.match(/([\d.]+)\s*(B|kB|KB|MiB|GiB|MB|GB)/i);
        if (!m) return s;
        const v = parseFloat(m[1]),
          u = m[2];
        return `${v}${u}`;
      };
      const barColor = (p) =>
        p > 90 ? "var(--r)" : p > 75 ? "var(--a)" : "var(--g)";
      const rtColor = (ms) =>
        ms < 0
          ? "var(--r)"
          : ms < 50
            ? "var(--g)"
            : ms < 200
              ? "var(--a)"
              : "var(--r)";
      const stackBadgeType = (status) => {
        if (status === "healthy" || status === "removed") return "g";
        if (status === "degraded") return "a";
        if (status === "deprecated-running") return "a";
        return "r";
      };
      const stackDotOk = (status) =>
        status === "healthy" || status === "removed"
          ? true
          : status === "degraded" || status === "deprecated-running"
            ? "degraded"
            : false;

      // ── Components ──
      const Dot = ({ ok }) => (
        <span
          className={`dot ${ok === true || ok === "healthy" || ok === "running" ? "dg" : ok === "stopped" || ok === false ? "dr" : "da"}`}
        />
      );
      const Badge = ({ text, type }) => (
        <span className={`badge b-${type}`}>{text}</span>
      );

      const Bar = ({ value, max, color }) => {
        const p = max ? Math.min(100, Math.round((value / max) * 100)) : 0;
        return (
          <div className="bar-bg">
            <div
              className="bar-fg"
              style={{ width: `${p}%`, background: color || barColor(p) }}
            />
          </div>
        );
      };

      const Spark = ({ data, color = "var(--g)" }) => {
        if (!data || !data.length) return null;
        const mx = Math.max(...data, 1);
        return (
          <div className="spark">
            {data.slice(-30).map((v, i) => (
              <div
                key={i}
                className="spark-bar"
                style={{
                  height: `${Math.max(4, (v / mx) * 100)}%`,
                  background: color,
                }}
              />
            ))}
          </div>
        );
      };

      const Metric = ({ value, unit, label, color }) => (
        <div>
          <div className="mv" style={{ color: color || "var(--tb)" }}>
            {value}
            <span className="ms">{unit}</span>
          </div>
          {label && <div className="ml">{label}</div>}
        </div>
      );

      const Card = ({ title, badge, children, style, delay = 0 }) => (
        <div
          className="card"
          style={{ ...style, animationDelay: `${delay * 40}ms` }}
        >
          <div className="card-hdr">
            <span className="label">{title}</span>
            {badge}
          </div>
          {children}
        </div>
      );

      // ── Dashboard ──
      function Dashboard() {
        const [d, setD] = useState(null);
        const [err, setErr] = useState(null);
        const [errCount, setErrCount] = useState(0);
        const [logs, setLogs] = useState([]);
        const [tick, setTick] = useState(0);
        const [now, setNow] = useState(new Date());
        const [dataAge, setDataAge] = useState(0);
        const [streamMode, setStreamMode] = useState("BOOTSTRAP");
        const streamRef = useRef(null);
        const reconnectRef = useRef(null);
        const pollRef = useRef(null);
        const lastLogAtRef = useRef(0);

        const appendLogsFromSnapshot = useCallback((j, force = false) => {
          const nowMs = Date.now();
          if (!force && nowMs - lastLogAtRef.current < 10000) return;
          lastLogAtRef.current = nowMs;

          const services = j.services || {};
          const containers = Array.isArray(j.containers) ? j.containers : [];
          const active = containers.filter(
            (c) => c.status !== "stopped" && c.status !== "created",
          );
          const up = active.filter(
            (c) => c.status === "healthy" || c.status === "running",
          ).length;
          const total = active.length;
          const ts = new Date().toLocaleTimeString("en-GB", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          });
          const envioSvc = services.envio_indexer || services.rates_indexer || {};
          const anvilSvc = services.anvil || {};
          const msgs = [
            {
              ts,
              msg: `health check complete — ${up}/${total} services ok`,
              cls: up === total ? "ok" : "warn",
            },
            j.stacks?.gates
              ? {
                  ts,
                  msg: j.stacks.gates.production_ready
                    ? "stack gate: production-ready"
                    : "stack gate: readiness checks failing",
                  cls: j.stacks.gates.production_ready ? "ok" : "warn",
                }
              : null,
            envioSvc.last_block
              ? {
                  ts,
                  msg: `envio latest timestamp: ${fmtN(envioSvc.last_block)}`,
                  cls: "ok",
                }
              : null,
            anvilSvc.block
              ? {
                  ts,
                  msg: `reth block: ${fmtN(anvilSvc.block)}`,
                  cls: "ok",
                }
              : null,
            j.databases?.pool_state?.last_indexed_block > 0
              ? {
                  ts,
                  msg: `indexer block: ${fmtN(j.databases.pool_state.last_indexed_block)} (${fmtN(j.databases.pool_state.events_rows)} events)`,
                  cls: "ok",
                }
              : j.databases?.pool_state?.healthy === false
                ? { ts, msg: "indexer postgres: unreachable", cls: "err" }
                : null,
            (j.system || {}).errors_today > 0
              ? {
                  ts,
                  msg: `⚠ ${(j.system || {}).errors_today} errors in today's logs`,
                  cls: "warn",
                }
              : null,
          ].filter(Boolean);
          setLogs((prev) => [...msgs, ...prev].slice(0, 50));
        }, []);

        const applySnapshot = useCallback((j, forceLog = false) => {
          setD(j);
          setErr(null);
          setErrCount(0);
          if (j.timestamp) {
            const age = Math.max(
              0,
              Math.floor((Date.now() - new Date(j.timestamp).getTime()) / 1000),
            );
            setDataAge(age);
          }
          appendLogsFromSnapshot(j, forceLog);
        }, [appendLogsFromSnapshot]);

        const loadBootstrap = useCallback(() => {
          return fetch("live-status?_=" + Date.now())
            .then((r) => {
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              return r.json();
            })
            .then((j) => applySnapshot(j, true))
            .catch((e) => {
              return fetch("status.json?_=" + Date.now())
                .then((r) => {
                  if (!r.ok) throw new Error(`HTTP ${r.status}`);
                  return r.json();
                })
                .then((j) => {
                  applySnapshot(j, true);
                  setStreamMode("BOOTSTRAP_SNAPSHOT");
                })
                .catch((fallbackErr) => {
                  const message = `live bootstrap failed: ${e.message}; snapshot fallback failed: ${fallbackErr.message}`;
                  setErr(message);
                  setErrCount((c) => c + 1);
                  const ts = new Date().toLocaleTimeString("en-GB", {
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit",
                  });
                  setLogs((prev) =>
                    [
                      { ts, msg: message, cls: "err" },
                      ...prev,
                    ].slice(0, 50),
                  );
                });
            });
        }, [applySnapshot]);

        const fetchLiveOnce = useCallback((forceLog = false) => {
          return fetch("live-status?_=" + Date.now())
            .then((r) => {
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              return r.json();
            })
            .then((j) => {
              applySnapshot(j, forceLog);
              return true;
            })
            .catch((e) => {
              setErr((prev) => prev || e.message);
              setErrCount((c) => c + 1);
              return false;
            });
        }, [applySnapshot]);

        useEffect(() => {
          let cancelled = false;

          const stopPolling = () => {
            if (pollRef.current) {
              clearInterval(pollRef.current);
              pollRef.current = null;
            }
          };

          const scheduleReconnect = () => {
            if (cancelled) return;
            if (reconnectRef.current) clearTimeout(reconnectRef.current);
            reconnectRef.current = setTimeout(connectStream, 3000);
          };

          const startPolling = () => {
            stopPolling();
            setStreamMode("POLLING");
            pollRef.current = setInterval(() => {
              fetchLiveOnce(false);
            }, 1000);
          };

          const connectStream = () => {
            if (cancelled) return;
            if (streamRef.current) {
              streamRef.current.close();
              streamRef.current = null;
            }
            try {
              const es = new EventSource("live-status/stream");
              streamRef.current = es;
              setStreamMode("STREAM_CONNECTING");
              es.onopen = () => {
                if (cancelled) return;
                setStreamMode("STREAM_1S");
                stopPolling();
              };
              es.onmessage = (evt) => {
                if (cancelled) return;
                try {
                  const payload = JSON.parse(evt.data);
                  applySnapshot(payload, false);
                } catch (parseErr) {
                  setErr(`live parse error: ${parseErr.message}`);
                }
              };
              es.onerror = () => {
                if (cancelled) return;
                if (streamRef.current === es) {
                  es.close();
                  streamRef.current = null;
                }
                startPolling();
                scheduleReconnect();
              };
            } catch (_err) {
              startPolling();
              scheduleReconnect();
            }
          };

          loadBootstrap().finally(() => {
            if (!cancelled) connectStream();
          });

          return () => {
            cancelled = true;
            stopPolling();
            if (reconnectRef.current) clearTimeout(reconnectRef.current);
            if (streamRef.current) {
              streamRef.current.close();
              streamRef.current = null;
            }
          };
        }, [applySnapshot, fetchLiveOnce, loadBootstrap]);

        useEffect(() => {
          const iv = setInterval(() => {
            setTick((t) => t + 1);
            setNow(new Date());
            setDataAge((a) => a + 1);
          }, 1000);
          return () => clearInterval(iv);
        }, []);

        if (!d && err)
          return (
            <div style={{ padding: 80, textAlign: "center" }}>
              <div
                style={{ color: "var(--r)", fontSize: 14 }}
                className="glow-r"
              >
                ✗ STATUS UNAVAILABLE
              </div>
              <div style={{ color: "var(--td)", marginTop: 8, fontSize: 11 }}>
                {err}
              </div>
            </div>
          );
        if (!d)
          return (
            <div style={{ padding: 80, textAlign: "center" }}>
              <span
                style={{
                  color: "var(--g)",
                  fontSize: 12,
                  animation: "pulse 1.5s ease infinite",
                }}
                className="glow-g"
              >
                ▌ INITIALIZING...
              </span>
            </div>
          );

        const {
          system: sys,
          containers: cts,
          services: svc,
          ssl,
          git,
          docker: dk,
          backups: bk,
          history: hist,
          stacks: stackDataRaw,
          contracts: contractsState,
          compose: composeProjects,
          domains: domainDataRaw,
        } = d;
        const stackData = stackDataRaw || {};
        const running = cts.filter(
          (c) => c.status === "healthy" || c.status === "running",
        );
        const stopped = cts.filter(
          (c) => c.status === "stopped" || c.status === "created",
        );
        // Only flag degraded if a stopped container is NOT the deployer AND didn't exit cleanly

        const stackOrder = [

          const values = Object.values(components || {});
          if (!values.length) return "unknown";

          if (okCount === values.length) return "healthy";

                        }}
                      >
                        <span style={{ fontSize: 10 }}>size</span>
                        <span
                          style={{
                            fontSize: 10,
                            color: "var(--tb)",
                            fontWeight: 600,
                          }}
                        >
                          {bk.size || "—"}
                        </span>
                      </div>
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                          alignItems: "center",
                        }}
                      >
                        <span style={{ fontSize: 10 }}>databases</span>
                        <span
                          style={{
                            fontSize: 10,
                            color:
                              bk.success === bk.total ? "var(--g)" : "var(--a)",
                            fontWeight: 600,
                          }}
                        >
                          {bk.success}/{bk.total}
                        </span>
                      </div>
                      <div
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                          alignItems: "center",
                        }}
                      >
                        <span style={{ fontSize: 10 }}>retained</span>
                        <span
                          style={{
                            fontSize: 10,
                            color: "var(--tb)",
                            fontWeight: 600,
                          }}
                        >
                          {bk.retained} day{bk.retained !== 1 ? "s" : ""}
                        </span>
                      </div>
                    </div>
                  );
                })()}
              </Card>

              <Card
                title="ACTIVITY LOG"
                badge={<Badge text="LIVE" type="g" />}
                delay={12}
              >
                <div
                  style={{
                    maxHeight: 100,
                    overflowY: "auto",
                    overflowX: "hidden",
                  }}
                >
                  {logs.length === 0 ? (
                    <div style={{ color: "var(--td)", fontSize: 10 }}>
                      waiting for first check...
                    </div>
                  ) : (
                    logs.slice(0, 15).map((l, i) => (
                      <div
                        key={i}
                        className="log"
                        style={{ animationDelay: `${i * 30}ms` }}
                      >
                        <span className="log-ts">{l.ts}</span>
                        <span
                          style={{
                            color:
                              l.cls === "ok"
                                ? "var(--g)"
                                : l.cls === "warn"
                                  ? "var(--a)"
                                  : "var(--r)",
                            fontSize: 10,
                          }}
                        >
                          {l.msg}
                        </span>
                      </div>
                    ))
                  )}
                </div>
              </Card>
            </div>

            {/* ══ FOOTER ══ */}
            <div className="ftr">
              RLD Protocol · Infrastructure Monitor v2.0 · auto-refresh 12s ·
              next update in{" "}
              <span style={{ color: "var(--c)" }}>{12 - (tick % 12)}s</span>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <Dashboard />,
      );
    </script>
  </body>
</html>
