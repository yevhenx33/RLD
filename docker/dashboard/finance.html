<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="vendor/react.min.js?v=dashboard-20260504"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #06080a;
        --s1: #0c0e12;
        --s2: #12151a;
        --s3: #181c22;
        --bdr: #1c2028;
        --bdr2: #252a33;
        --g: #00ff88;
        --g10: rgba(0, 255, 136, 0.06);
        --g20: rgba(0, 255, 136, 0.12);
        --a: #ffb020;
        --a10: rgba(255, 176, 32, 0.06);
        --a20: rgba(255, 176, 32, 0.12);
        --r: #ff4455;
        --r10: rgba(255, 68, 85, 0.06);
        --r20: rgba(255, 68, 85, 0.12);
        --c: #38bdf8;
        --c10: rgba(56, 189, 248, 0.06);
        --p: #a78bfa;
        --p10: rgba(167, 139, 250, 0.06);
        --t: #8892a0;
        --td: #4a5260;
        --tb: #d0d5dd;
        --tw: #f0f2f5;
      }
      html {
        font-size: 13px;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        color: var(--t);
        min-height: 100vh;
        line-height: 1.5;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 136, 0.004) 2px,
          rgba(0, 255, 136, 0.004) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }
      ::selection {
        background: var(--g20);
        color: var(--g);
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .wrap,
      .dash {
        max-width: 1440px;
        margin: 0 auto;
        padding: 12px 16px;
      }
      .empty-state {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 8px;
      }
      .hdr {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 0 14px;
        border-bottom: 1px solid var(--bdr);
        margin-bottom: 12px;
      }
      .hdr-l {
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .hdr-r {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 10px;
        color: var(--td);
      }
      .logo {
        font-size: 16px;
        font-weight: 700;
        color: var(--g);
        text-shadow: 0 0 12px rgba(0, 255, 136, 0.25);
      }
      .subtitle {
        font-size: 10px;
        color: var(--td);
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--bdr);
      }
      .tab {
        padding: 7px 14px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.8px;
        text-transform: uppercase;
        color: var(--td);
        text-decoration: none;
        border-bottom: 2px solid transparent;
      }
      .tab:hover {
        color: var(--tb);
      }
      .tab.active {
        color: var(--c);
        border-bottom-color: var(--c);
      }
      .grid {
        display: grid;
        gap: 1px;
      }
      .g2 {
        grid-template-columns: 1fr 1fr;
      }
      .g3 {
        grid-template-columns: repeat(3, 1fr);
      }
      .g4 {
        grid-template-columns: repeat(4, 1fr);

      .g5 {
        grid-template-columns: repeat(5, 1fr);
      }
      .g32 {
        grid-template-columns: 3fr 2fr;
      }
      .g23 {
        grid-template-columns: 2fr 3fr;
      }
      @media (max-width: 900px) {
        .g3,
        .g4,
        .g5,
        .g32,
        .g23 {
          grid-template-columns: 1fr;
        }
        .hdr {
          align-items: flex-start;
          flex-direction: column;
          gap: 8px;
        }
        .hdr-r {
          flex-wrap: wrap;
        }
      }
      .card {
        background: var(--s1);
        border: 1px solid var(--bdr);
        padding: 12px 14px;
        animation: fadeUp 0.35s ease both;
      }
      .card-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--td);
      }
      .card-hdr .label {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .section {
        margin-bottom: 12px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-size: 8px;
        padding: 2px 7px;
        border-radius: 2px;
        letter-spacing: 1.2px;
        font-weight: 600;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .b-g {
        background: var(--g10);
        color: var(--g);
        border: 1px solid var(--g20);
      }
      .b-a {
        background: var(--a10);
        color: var(--a);
        border: 1px solid var(--a20);
      }
      .b-r {
        background: var(--r10);
        color: var(--r);
        border: 1px solid var(--r20);
      }
      .b-c {
        background: var(--c10);
        color: var(--c);
        border: 1px solid rgba(56, 189, 248, 0.15);
      }
      .b-p {
        background: var(--p10);
        color: var(--p);
        border: 1px solid rgba(167, 139, 250, 0.15);
      }
      .dot {
        width: 5px;

        border-radius: 50%;

      }
      .dg {
        background: var(--g);

      }
      .da {
        background: var(--a);
        box-shadow: 0 0 5px var(--a);
      }
      .dr {
        background: var(--r);
        box-shadow: 0 0 5px var(--r);
      }
      .live {
        animation: blink 1.4s step-end infinite;
        color: var(--g);
      }
      .mv {
        font-size: 24px;
        font-weight: 700;
        color: var(--tw);
        line-height: 1.15;
        letter-spacing: 0;
      }
      .ml {
        font-size: 10px;

      }
      .mono {
        font-family: "JetBrains Mono", monospace;
      }
      .muted {
        color: var(--td);
      }
      .good {
        color: var(--g);
      }
      .warn {
        color: var(--a);
      }
      .bad {
        color: var(--r);
      }
      .info {
        color: var(--c);
      }
      .purple {
        color: var(--p);
      }
      .chart-wrap {
        position: relative;
        height: 360px;
        border: 1px solid var(--bdr);
        background: var(--s1);
        overflow: hidden;
      }
      .chart-svg {
        width: 100%;
        height: 100%;
      }
      .legend {
        display: flex;
        gap: 14px;
        font-size: 9px;
        color: var(--td);
        letter-spacing: 1px;
      }
      .legend-dot {
        width: 10px;
        height: 3px;
        border-radius: 1px;
        display: inline-block;
        margin-right: 5px;
      }
      .tbl-wrap {
        overflow-x: auto;
        border: 1px solid var(--bdr);
        background: var(--s1);
      }
      .tbl {
        width: 100%;
        border-collapse: collapse;
      }
      .tbl th {
        padding: 8px 10px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: var(--td);

        border-bottom: 1px solid var(--bdr);
        white-space: nowrap;
      }
      .tbl th.r,
      .tbl td.r {
        text-align: right;
      }
      .tbl td {
        padding: 9px 10px;
        font-size: 11px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);

        white-space: nowrap;
      }
      .tbl tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }
      .tbl-footer {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 9px 10px;
        font-size: 10px;
        color: var(--td);
        border-top: 1px solid var(--bdr);
        flex-wrap: wrap;
      }
      .kv {
        display: grid;
        gap: 1px;
      }
      .kv-row {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.035);

      }
      .kv-row:last-child {
        border-bottom: 0;
      }
      .kv-k {
        color: var(--td);
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 9px;
      }
      .kv-v {
        color: var(--tb);
        overflow-wrap: anywhere;
      }
      .evt-list {
        max-height: 330px;
        overflow: auto;
      }
      .evt {
        display: grid;
        grid-template-columns: 92px 74px 96px 1fr;
        gap: 9px;
        align-items: center;
        padding: 7px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        font-size: 10px;
      }
      .evt:last-child {
        border-bottom: 0;
      }
      @media (max-width: 700px) {
        .evt {
          grid-template-columns: 1fr;
          gap: 3px;
        }
      }
      .banner {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        margin-bottom: 12px;
        border: 1px solid var(--bdr);
        background: var(--s1);
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .banner.warn {
        color: var(--a);
        border-color: var(--a20);
        background: var(--a10);
      }
      .banner.bad {
        color: var(--r);
        border-color: var(--r20);
        background: var(--r10);
      }
      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 68, 85, 0.25);
        border-top-color: var(--r);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .ftr {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0 4px;
        font-size: 9px;
        color: var(--td);
        border-top: 1px solid var(--bdr);
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useCallback, useMemo } = React;

      // ══════════════════ UTILS ══════════════════
      const fmt = (v, d = 2) => {
        if (v === undefined || v === null || v === "") return "—";
        const n = Number(v);
        if (isNaN(n)) return v;
        if (Math.abs(n) >= 1e9) return "$" + (n / 1e9).toFixed(d) + "B";
        if (Math.abs(n) >= 1e6) return "$" + (n / 1e6).toFixed(d) + "M";
        if (Math.abs(n) >= 1e3)
          return (
            "$" +
            n.toLocaleString(undefined, {
              minimumFractionDigits: d,
              maximumFractionDigits: d,
            })
          );
        return "$" + n.toFixed(d);
      };
      const fmtN = (n, d = 2) => {
        if (n === undefined || n === null || n === "") return "—";
        const v = Number(n);
        if (isNaN(v)) return n;
        if (v >= 1e9) return (v / 1e9).toFixed(d) + "B";
        if (v >= 1e6) return (v / 1e6).toFixed(d) + "M";
        if (v >= 1e3) return v.toLocaleString();
        return v.toFixed(d);
      };
      const fmtPct = (v, d = 2) => {
        if (v === undefined || v === null) return "—";
        return (v >= 0 ? "+" : "") + Number(v).toFixed(d) + "%";
      };
      const fmtAddr = (a) => (a ? `${a.slice(0, 6)}…${a.slice(-4)}` : "—");
      const fmtTs = (ts) => {
        if (!ts) return "—";
        const d = new Date(ts * 1000);
        return d.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      };
      const fromRaw = (v, decimals = 6) => {
        if (!v && v !== 0) return 0;
        return Number(v) / Math.pow(10, decimals);
      };
      const rawWord = (raw, index) => {
        const body = String(raw || "").replace(/^0x/, "");
        const start = index * 64;
        return body.length >= start + 64 ? body.slice(start, start + 64) : null;
      };
      const wordToSignedNumber = (word) => {
        if (!word) return 0;
        try {
          const value = BigInt("0x" + word);
          const signBit = BigInt(2) ** BigInt(255);
          const mod = BigInt(2) ** BigInt(256);
          const signed = value >= signBit ? value - mod : value;
          return Number(signed);
        } catch {
          return 0;
        }
      };
      const wordToUnsignedNumber = (word) => {
        if (!word) return 0;
        try {
          return Number(BigInt("0x" + word));
        } catch {
          return 0;
        }
      };
      const topicAddr = (topic) => {
        const t = String(topic || "").replace(/^0x/, "");
        return t.length >= 40 ? "0x" + t.slice(-40) : "";
      };
      const summarizeEvent = (e) => {
        const name = e.event_name || "";
        const data = e.event_data || {};
        const topics = data.topics || [];
        if (name === "Swap") {
          const amount0 = wordToSignedNumber(rawWord(data.raw, 0));
          const amount1 = wordToSignedNumber(rawWord(data.raw, 1));
          const actor = topicAddr(topics[2]);
          const side = amount0 > 0 ? "BUY" : "SELL";
          const quote = Math.abs(amount1) / 1e6;
          return {
            label: "Pool Swap",
            badge: side,
            type: side === "BUY" ? "g" : "a",
            tone: "info",
            detail: `${fmtN(quote)} aUSDC / ${fmtAddr(actor)}`,
          };
        }
        if (name === "SwapExecuted") {
          const direction = wordToUnsignedNumber(rawWord(data.raw, 0));
          const amountIn = wordToUnsignedNumber(rawWord(data.raw, 1)) / 1e6;
          const amountOut = wordToUnsignedNumber(rawWord(data.raw, 2)) / 1e6;
          const actor = topicAddr(topics[2]);
          return {
            label: "Strategy Swap",
            badge: direction === 1 ? "BUY" : "SELL",
            type: "c",
            tone: "info",
            detail: `${fmtN(amountIn)} -> ${fmtN(amountOut)} / ${fmtAddr(actor)}`,
          };
        }
        if (name === "GhostTaken") {
          const amount = wordToUnsignedNumber(rawWord(data.raw, 0)) / 1e6;
          const tickLower = wordToSignedNumber(rawWord(data.raw, 1));
          const tickUpper = wordToSignedNumber(rawWord(data.raw, 2));
          return {
            label: "Ghost Liquidity",
            badge: "TAKEN",
            type: "p",
            tone: "purple",
            detail: `${fmtN(amount)} claimed / ticks ${tickLower}..${tickUpper}`,
          };
        }
        if (name === "Transfer" || name === "ERC20Transfer") {
          const from = data.from || topicAddr(topics[1]);
          const to = data.to || topicAddr(topics[2]);
          return {
            label: "Token Transfer",
            badge: "ERC20",
            type: "a",
            tone: "muted",
            detail: `${fmtAddr(from)} -> ${fmtAddr(to)}`,
            technical: true,
          };
        }
        return {
          label: name || "Protocol Event",
          badge: "EVENT",
          type: "a",
          tone: "muted",
          detail: "Indexed protocol event",
        };
      };

      // ══════════════════ COMPONENTS ══════════════════
      const Badge = ({ text, type }) => (
        <span className={`badge b-${type}`}>{text}</span>
      );

      // ── Price Chart ──
      const PriceChart = ({ data }) => {
        if (!data || data.length < 2)
          return (
            <div
              style={{
                height: 420,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                color: "var(--td)",
              }}
            >
              <span
                style={{ animation: "pulse 1.5s ease infinite", fontSize: 13 }}
              >
                Loading price history…
              </span>
            </div>
          );

        const marks = data
          .map((d) => d.mark_price)
          .filter((v) => v != null && v > 0);
        const idxs = data
          .map((d) => d.index_price)
          .filter((v) => v != null && v > 0);
        const allPrices = [...marks, ...idxs];
        const mn = Math.min(...allPrices);
        const mx = Math.max(...allPrices);
        const range = mx - mn || 0.01;

        const w = 1400,
          h = 420,
          padL = 70,
          padR = 24,
          padT = 48,
          padB = 36;
        const cw = w - padL - padR,
          ch = h - padT - padB;
        const toX = (i) => padL + (i / (data.length - 1)) * cw;
        const toY = (v) => padT + ch - ((v - mn) / range) * ch;

        let markPath = "",
          idxPath = "";
        data.forEach((d, i) => {
          const x = toX(i);
          if (d.mark_price > 0) {
            const y = toY(d.mark_price);
            markPath += (markPath ? "L" : "M") + `${x},${y} `;
          }
          if (d.index_price > 0) {
            const y = toY(d.index_price);
            idxPath += (idxPath ? "L" : "M") + `${x},${y} `;
          }
        });

        const ySteps = 6;
        const yLabels = [];
        for (let i = 0; i <= ySteps; i++) {
          const v = mn + (range / ySteps) * i;
          yLabels.push({ y: toY(v), label: "$" + v.toFixed(4) });
        }

        const xLabels = [];
        const step = Math.max(1, Math.floor(data.length / 6));
        for (let i = 0; i < data.length; i += step) {
          const d = data[i];
          if (d.timestamp) {
            const dt = new Date(d.timestamp * 1000);
            xLabels.push({
              x: toX(i),
              label: dt.toLocaleTimeString("en-GB", {
                hour: "2-digit",
                minute: "2-digit",
              }),
            });
          }
        }

        const latestMark = marks[marks.length - 1];
        const latestIdx = idxs[idxs.length - 1];

        return (
          <div className="chart-wrap">
            <svg
              className="chart-svg"
              viewBox={`0 0 ${w} ${h}`}
              preserveAspectRatio="none"
            >
              <defs>
                <linearGradient id="mg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="var(--c)" stopOpacity="0.06" />
                  <stop offset="100%" stopColor="var(--c)" stopOpacity="0" />
                </linearGradient>
              </defs>
              {yLabels.map((yl, i) => (
                <g key={i}>
                  <line
                    x1={padL}
                    y1={yl.y}
                    x2={w - padR}
                    y2={yl.y}
                    stroke="var(--bdr)"
                    strokeWidth="0.5"
                  />
                  <text
                    x={padL - 8}
                    y={yl.y + 4}
                    textAnchor="end"
                    fill="var(--td)"
                    fontSize="10"
                    fontFamily="JetBrains Mono"
                  >
                    {yl.label}
                  </text>
                </g>
              ))}
              {xLabels.map((xl, i) => (
                <text
                  key={i}
                  x={xl.x}
                  y={h - 10}
                  textAnchor="middle"
                  fill="var(--td)"
                  fontSize="10"
                  fontFamily="JetBrains Mono"
                >
                  {xl.label}
                </text>
              ))}
              <path
                d={idxPath}
                fill="none"
                stroke="var(--p)"
                strokeWidth="1.5"
                strokeOpacity="0.6"
                vectorEffect="non-scaling-stroke"
              />
              <path
                d={markPath}
                fill="none"
                stroke="var(--c)"
                strokeWidth="2"
                vectorEffect="non-scaling-stroke"
              />
              {latestMark > 0 && (
                <circle
                  cx={toX(data.length - 1)}
                  cy={toY(latestMark)}
                  r="4"
                  fill="var(--c)"
                  stroke="var(--bg)"
                  strokeWidth="1.5"
                />
              )}
              {latestIdx > 0 && (
                <circle
                  cx={toX(data.length - 1)}
                  cy={toY(latestIdx)}
                  r="3"
                  fill="var(--p)"
                  stroke="var(--bg)"
                  strokeWidth="1.5"
                />
              )}
            </svg>
            <div style={{ position: "absolute", top: 12, left: padL + 12 }}>
              <div className="legend">
                <span>
                  <span
                    className="legend-dot"
                    style={{ background: "var(--c)" }}
                  />
                  MARK PRICE
                </span>
                <span>
                  <span
                    className="legend-dot"
                    style={{ background: "var(--p)" }}
                  />
                  INDEX PRICE
                </span>
              </div>
            </div>
            <div
              style={{
                position: "absolute",
                top: 10,
                right: 16,
                textAlign: "right",
              }}
            >
              <div style={{ fontSize: 11, color: "var(--td)" }}>
                MARK{" "}
                <span
                  style={{ color: "var(--c)", fontWeight: 600, fontSize: 18 }}
                >
                  ${latestMark?.toFixed(4)}
                </span>
              </div>
              <div style={{ fontSize: 11, color: "var(--td)", marginTop: 2 }}>
                INDEX{" "}
                <span
                  style={{ color: "var(--p)", fontWeight: 600, fontSize: 18 }}
                >
                  ${latestIdx?.toFixed(4)}
                </span>
              </div>
            </div>
            <div
              style={{
                position: "absolute",
                bottom: padB + 8,
                left: padL + 12,
                fontSize: 10,
                color: "var(--td)",
              }}
            >
              {data.length} blocks · {data[0].block_number?.toLocaleString()} →{" "}
              {data[data.length - 1].block_number?.toLocaleString()}
            </div>
          </div>
        );
      };

      // ══════════════════ MAIN APP ══════════════════
      function App() {
        const [latest, setLatest] = useState(null);
        const [chartData, setChartData] = useState(null);
        const [events, setEvents] = useState([]);
        const [marketInfo, setMarketInfo] = useState(null);
        const [statusInfo, setStatusInfo] = useState(null);
        const [err, setErr] = useState(null);
        const [errCount, setErrCount] = useState(0);
        const [disconnected, setDisconnected] = useState(false);
        const [simRestarted, setSimRestarted] = useState(false);
        const [lastBlock, setLastBlock] = useState(null);
        const [tick, setTick] = useState(0);
        const [now, setNow] = useState(new Date());

        // Detect simulation restart: block number goes backwards
        const detectRestart = useCallback(
          (newData) => {
            if (!newData?.block_number) return false;
            const newBlock = newData.block_number;
            if (lastBlock !== null && newBlock < lastBlock - 10) {
              // Block went backwards significantly = sim was restarted
              return true;
            }
            return false;
          },
          [lastBlock],
        );

        const loadLatest = useCallback(() => {
          fetch("graphql?ts=" + Date.now(), {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({ query: `
              query {
                markets { marketId normalizationFactor totalDebtRaw }
              }
            `})
          })
            .then(r => r.json())
            .then(res => {
              if (res.errors) throw new Error(res.errors[0].message);
              if (!res.data.markets.length) throw new Error("No markets found");
              const m = res.data.markets[0];
              const mId = m.marketId;
              
              return fetch("graphql?ts=" + Date.now(), {
                method: "POST",
                headers: { 
                  "Content-Type": "application/json",
                  "Accept": "application/json"
                },
                body: JSON.stringify({ query: `
                  query {
                    poolSnapshot(marketId: "${mId}") {
                      blockNumber markPrice indexPrice tick totalDebt
                      liquidity token0Balance token1Balance
                      feeGrowthGlobal0 feeGrowthGlobal1
                    }
                    snapshot
                    brokers(marketId: "${mId}") {
                      address wausdcBalance debtPrincipal
                    }
                  }
                `})
              }).then(r => r.json()).then(res2 => {
                 if (res2.errors) throw new Error(res2.errors[0].message);
                 const ps = res2.data.poolSnapshot || {};
                 const snap = res2.data.snapshot || {};
                 const br = res2.data.brokers || [];
                 const nfRaw = m.normalizationFactor || "1000000000000000000";
                 const nfFloat = parseFloat(nfRaw) / 1e18;
                 const indexFromSnapshot = Number(
                   snap?.market?.indexPrice || snap?.market?.index_price || 0
                 );
                 const indexFromPoolSnapshot = Number(ps.indexPrice || 0);
                 const indexForState =
                   indexFromPoolSnapshot > 0
                     ? indexFromPoolSnapshot
                     : indexFromSnapshot > 0
                       ? indexFromSnapshot
                       : 0;
                 
                 const pMarkPrice = ps.markPrice || 0;

                 
                   const d = {
                   block_number: ps.blockNumber || 0,
                   market_states: [{
                     index_price: indexForState > 0 ? indexForState.toString() : "",
                     normalization_factor: nfRaw,
                      total_debt: ps.totalDebt != null ? ps.totalDebt : Number(m.totalDebtRaw || 0)
                   }],
                   pool_states: [{
                     mark_price: ps.markPrice || 0,
                     tick: ps.tick || 0,
                     liquidity: ps.liquidity || null,
                     token0_balance: ps.token0Balance || null,
                     token1_balance: ps.token1Balance || null,
                     fee_growth_global0: ps.feeGrowthGlobal0 || null,
                     fee_growth_global1: ps.feeGrowthGlobal1 || null,
                   }],
                    broker_positions: br.map(b => {
                      // DB stores values already in human USDC (divided by 1e6 in handlers)
                      const collateral = parseFloat(b.wausdcBalance || "0");
                      const debtPrin = parseFloat(b.debtPrincipal || "0");
                      const debt = debtPrin * nfFloat;

                      const collateralValue = collateral;  // waUSDC ~ USDC 1:1
                      const debtValue = debt * pMarkPrice;

                      let hf = 100;
                      if (debtValue > 0) {
                        hf = collateralValue / debtValue;
                      }
                      return {
                        broker_address: b.address,
                        collateral: collateral,
                        debt: debt,
                        collateral_value: collateralValue,
                        debt_value: debtValue,
                        health_factor: hf,
                      };
                    })
                 };
                 
                 if (detectRestart(d)) {
                   setSimRestarted(true);
                   setChartData(null);
                   setEvents([]);
                   setTimeout(() => setSimRestarted(false), 30000);
                 }
                 setLastBlock(d.block_number || null);
                 setLatest(d);
                 setErr(null);
                 setErrCount(0);
                 setDisconnected(false);
              });
            })
            .catch((e) => {
              setErr(e.message);
              setErrCount((c) => c + 1);
              if (errCount >= 2) setDisconnected(true);
            });
        }, [detectRestart, errCount]);

        const loadChart = useCallback(() => {
          fetch("graphql?ts=" + Date.now(), {
            method: "POST", 
            headers: { 
              "Content-Type": "application/json",
              "Accept": "application/json" 
            },
            body: JSON.stringify({ query: `
              query {
                markets { marketId }
              }
            `})
          }).then(r => r.json()).then(res => {
             if (!res.data.markets.length) return;
             const mId = res.data.markets[0].marketId;
             return fetch("graphql?ts=" + Date.now(), {
               method: "POST", 
               headers: { 
                 "Content-Type": "application/json",
                 "Accept": "application/json"
               },
               body: JSON.stringify({ query: `
                 query {
                   candles(marketId: "${mId}", resolution: "1m", limit: 1000) {
                     bucket indexClose markClose
                   }
                 }
               `})
             }).then(r => r.json()).then(res2 => {
               const candles = res2?.data?.candles || [];
               const candleData = candles.map(c => ({
                 timestamp: c.bucket,
                 mark_price: Number(c.markClose || 0),
                 index_price: Number(c.indexClose || 0)
               })).filter(p => p.mark_price > 0 || p.index_price > 0);
               if (candleData.length >= 2) {
                 setChartData(candleData);
                 return;
               }

               // Fallback for sparse deployments: chart directly from block_states.
               return fetch("api/price-history?limit=1000")
                 .then(r => (r.ok ? r.json() : null))
                 .then(hist => {
                   const points = (hist?.points || [])
                     .map(p => ({
                       timestamp: p.block_timestamp || p.timestamp,
                       block_number: p.block_number,
                       mark_price: Number(p.mark_price || 0),
                       index_price: Number(p.index_price || 0),
                     }))
                     .filter(p => p.mark_price > 0 || p.index_price > 0);
                   if (points.length >= 2) setChartData(points);
                   else if (candleData.length > 0) setChartData(candleData);
                 });
             });
          }).catch(() => {});
        }, []);

        const loadEvents = useCallback(() => {
          fetch("graphql?ts=" + Date.now(), {
            method: "POST", 
            headers: { 
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({ query: `
              query {
                events(limit: 100) {
                  eventName blockTimestamp blockNumber data
                }
              }
            `})
          }).then(r => r.json()).then(res => {
            if (res.data && res.data.events) {
               const evs = res.data.events.map(e => {
                  let parsed = {};
                  try { parsed = JSON.parse(e.data); } catch(err) {}
                  return {
                     event_name: e.eventName,
                     block_timestamp: e.blockTimestamp,
                     block_number: e.blockNumber,
                     event_data: parsed
                  };
               });
               setEvents(evs);
            }
          }).catch(() => {});
        }, []);

        const loadMarketInfo = useCallback(() => {
          fetch("api/market-info?ts=" + Date.now())
            .then((r) => (r.ok ? r.json() : null))
            .then((data) => {
              if (data && !data.status) setMarketInfo(data);
            })
            .catch(() => {});
        }, []);

        const loadStatus = useCallback(() => {
          fetch("api/status?ts=" + Date.now())
            .then((r) => (r.ok ? r.json() : null))
            .then((data) => {
              if (data && data.status === "ok") setStatusInfo(data);
            })
            .catch(() => {});
        }, []);

        useEffect(() => {
          loadLatest();
          loadChart();
          loadEvents();
          loadMarketInfo();
          loadStatus();
          const iv1 = setInterval(loadLatest, 10000);
          const iv2 = setInterval(loadChart, 60000);
          const iv3 = setInterval(loadEvents, 30000);
          const iv4 = setInterval(loadMarketInfo, 60000);
          const iv5 = setInterval(loadStatus, 10000);
          return () => {
             clearInterval(iv1);
             clearInterval(iv2);
             clearInterval(iv3);
             clearInterval(iv4);
             clearInterval(iv5);
          };
        }, [loadLatest, loadChart, loadEvents, loadMarketInfo, loadStatus]);

        useEffect(() => {
          const iv = setInterval(() => {
            setTick((t) => t + 1);
            setNow(new Date());
          }, 1000);
          return () => clearInterval(iv);
        }, []);

        if (err && !latest)
          return (
            <div
              className="dash"
              style={{ paddingTop: 80, textAlign: "center" }}
            >
              <div style={{ color: "var(--r)", fontSize: 16, fontWeight: 600 }}>
                ✗ SIM INDEXER UNAVAILABLE
              </div>
              <div style={{ color: "var(--td)", marginTop: 8, fontSize: 13 }}>
                {err}
              </div>
              <div style={{ color: "var(--td)", marginTop: 16, fontSize: 12 }}>
                <div
                  className="reconnect-spinner"
                  style={{ margin: "12px auto" }}
                />
                Retrying every 10s… (attempt {errCount})
              </div>
              <div style={{ color: "var(--td)", marginTop: 12, fontSize: 11 }}>
                If a simulation restart is in progress, this will reconnect
                automatically.
              </div>
            </div>
          );
        if (!latest)
          return (
            <div
              className="dash"
              style={{ paddingTop: 80, textAlign: "center" }}
            >
              <span
                style={{
                  color: "var(--g)",
                  fontSize: 14,
                  animation: "pulse 1.5s ease infinite",
                }}
              >
                ▌ LOADING SIMULATION DATA…
              </span>
            </div>
          );

        // ── Parse latest ──
        const ms = latest.market_states?.[0] || latest.market_state || {};
        const ps = latest.pool_states?.[0] || latest.pool_state || {};
        const bps = latest.broker_positions || [];

        const markPrice = ps.mark_price || 0;
        const indexFromState = Number(ms.index_price || 0);
        const indexPrice = indexFromState > 0
          ? indexFromState
          : Number(statusInfo?.index_price || 0);
        const normFactor = ms.normalization_factor
          ? Number(ms.normalization_factor) / 1e18
          : 1;
        const totalDebt = Number(ms.total_debt || 0);

        const totalCollateral = bps.reduce(
          (a, b) => a + Number(b.collateral || 0),
          0,
        );
        const totalBrokerDebt = bps.reduce((a, b) => a + Number(b.debt || 0), 0);
        const totalCollateralValue = bps.reduce(
          (a, b) => a + Number(b.collateral_value || 0),
          0,
        );
        const totalDebtValue = bps.reduce(
          (a, b) => a + Number(b.debt_value || 0),
          0,
        );

        const overCollat =
          totalDebtValue > 0
            ? totalCollateralValue / totalDebtValue
            : totalCollateralValue > 0
              ? Infinity
              : 0;
        const overCollatDisplay =
          overCollat === Infinity
            ? "∞"
            : overCollat > 0
              ? (overCollat * 100).toFixed(1) + "%"
              : "—";
        const hasIndexPrice = indexPrice > 0;
        const pegDev =
          hasIndexPrice ? ((markPrice - indexPrice) / indexPrice) * 100 : 0;

        const swaps = events.filter((e) => e.event_name === "Swap");
        const protocolEvents = events.filter(
          (e) => !["ERC20Transfer", "Transfer"].includes(e.event_name),
        );
        const displayEvents = (protocolEvents.length ? protocolEvents : events).slice(0, 50);
        const totalVol = swaps.reduce(
          (a, e) => a + Math.abs(fromRaw(e.event_data?.amount1 || "0", 6)),
          0,
        );
        const blockNumber = Number(latest.block_number || 0);
        const apiOk = statusInfo?.status === "ok";
        const hasSnapshot = blockNumber > 0;
        const hasHistory = (chartData?.length || 0) >= 2;
        const marketConfigured = Boolean(
          marketInfo?.marketId || marketInfo?.market_id,
        );
        const activeBrokers = bps.filter(
          (b) => Number(b.collateral || 0) > 0 || Number(b.debt || 0) > 0,
        ).length;
        const zeroAddress = "0x0000000000000000000000000000000000000000";
        const hookAddress = marketInfo?.twammHook || marketInfo?.twamm_hook;
        const hookless = !hookAddress || hookAddress === zeroAddress;
        const riskType =
          overCollat === Infinity || overCollat === 0 || overCollat >= 1.5
            ? "g"
            : overCollat >= 1.2
              ? "a"
              : "r";
        const riskLabel =
          overCollat === Infinity || overCollat === 0
            ? "NO DEBT"
            : overCollat >= 1.5
              ? "SAFE"
              : overCollat >= 1.2
                ? "WATCH"
                : "DANGER";
        const pegType =
          !hasIndexPrice || Math.abs(pegDev) < 1
            ? "g"
            : Math.abs(pegDev) < 5
              ? "a"
              : "r";
        const syncType =
          disconnected || err
            ? "r"
            : apiOk && hasSnapshot
              ? "g"
              : "a";
        const syncLabel =
          disconnected || err
            ? "DEGRADED"
            : apiOk && hasSnapshot
              ? "LIVE"
              : "WARMING";
        const nfText = Number.isFinite(normFactor)
          ? normFactor.toFixed(6)
          : "0.000000";
        const poolRows = [
          ["Active Liquidity", ps.liquidity ? fmtN(Number(ps.liquidity)) : "-"],
          ["Token0 Balance", ps.token0_balance != null ? `${fmtN(Number(ps.token0_balance))} wRLP` : "-"],
          ["Token1 Balance", ps.token1_balance != null ? `${fmtN(Number(ps.token1_balance))} waUSDC` : "-"],
          ["Current Tick", ps.tick ?? "-"],
          ["Fee Growth G0", ps.fee_growth_global0 ? fmtN(Number(ps.fee_growth_global0) / 2 ** 128, 8) : "-"],
          ["Fee Growth G1", ps.fee_growth_global1 ? fmtN(Number(ps.fee_growth_global1) / 2 ** 128, 8) : "-"],
        ];
        const marketRows = [
          ["Market ID", fmtAddr(marketInfo?.marketId || marketInfo?.market_id)],
          ["Pool ID", fmtAddr(marketInfo?.poolId || marketInfo?.pool_id)],
          [
            "Pool Params",
            `${marketInfo?.poolFee ?? marketInfo?.pool_fee ?? "-"} fee / ${marketInfo?.tickSpacing ?? marketInfo?.tick_spacing ?? "-"} tick`,
          ],
          ["Mock Oracle", fmtAddr(marketInfo?.mockOracle || marketInfo?.mock_oracle)],
          ["Ghost Router", fmtAddr(marketInfo?.ghostRouter || marketInfo?.ghost_router)],
          ["TWAP Engine", fmtAddr(marketInfo?.twapEngine || marketInfo?.twap_engine)],
          ["TWAP Lens", fmtAddr(marketInfo?.twapEngineLens || marketInfo?.twap_engine_lens)],
          ["TWAMM Hook", fmtAddr(hookAddress)],
        ];
        const readinessRows = [
          ["Indexer API", apiOk, statusInfo?.status || "no response"],
          ["GraphQL Snapshot", hasSnapshot, blockNumber ? `block ${blockNumber.toLocaleString()}` : "no block"],
          ["Price History", hasHistory, `${chartData?.length || 0} points`],
          ["Event Stream", Array.isArray(events), `${events.length} events`],
          ["Market Config", marketConfigured, marketConfigured ? "loaded" : "missing"],
        ];

        return (
          <div className="wrap">
            <div className="hdr">
              <div className="hdr-l">
                <span className="logo">RLD</span>
                <span className="subtitle">simulation monitor</span>
              </div>
              <div className="hdr-r">
                <Badge text={syncLabel} type={syncType} />
                <span>
                  block <span className="info">{blockNumber.toLocaleString()}</span>
                </span>
                <span>{now.toLocaleTimeString("en-GB")}</span>
                <span className="live">|</span>
              </div>
            </div>

            <div className="tabs">
              <a className="tab" href="index.html">
                INFRA STATUS
              </a>
              <a className="tab active" href="finance.html">
                SIMULATION
              </a>
            </div>

            {disconnected && latest && (
              <div className="banner bad">
                <div className="spinner" />
                SIM INDEXER DISCONNECTED - reconnecting, data may be stale
              </div>
            )}
            {simRestarted && (
              <div className="banner warn">
                SIMULATION RESTARTED - chart and event buffers are refreshing
              </div>
            )}

            <div className="section grid g5">
              <div className="card">
                <div className="card-hdr">
                  <span className="label">
                    <span className={`dot d${syncType}`} /> Runtime
                  </span>
                  <Badge text={syncLabel} type={syncType} />
                </div>
                <div className={`mv ${syncType === "g" ? "good" : syncType === "a" ? "warn" : "bad"}`}>
                  {syncLabel}
                </div>
                <div className="ml">refresh in {10 - (tick % 10)}s</div>
              </div>
              <div className="card">
                <div className="card-hdr">
                  <span>Mark Price</span>
                  <Badge text="POOL" type="c" />
                </div>
                <div className="mv info">{fmt(markPrice, 4)}</div>
                <div className="ml">wRLP / aUSDC</div>
              </div>
              <div className="card">
                <div className="card-hdr">
                  <span>Index Price</span>
                  <Badge text={hasIndexPrice ? fmtPct(pegDev) : "-"} type={pegType} />
                </div>
                <div className="mv purple">{hasIndexPrice ? fmt(indexPrice, 4) : "-"}</div>
                <div className="ml">oracle peg deviation</div>
              </div>
              <div className="card">
                <div className="card-hdr">
                  <span>Total Debt</span>
                  <Badge text="wRLP" type={totalDebt > 0 ? "a" : "g"} />
                </div>
                <div className={`mv ${totalDebt > 0 ? "warn" : ""}`}>{fmtN(totalDebt)}</div>
                <div className="ml">{totalDebtValue > 0 ? `approx ${fmt(totalDebtValue)}` : "no open debt value"}</div>
              </div>
              <div className="card">
                <div className="card-hdr">
                  <span>Risk</span>
                  <Badge text={riskLabel} type={riskType} />
                </div>
                <div className={`mv ${riskType === "g" ? "good" : riskType === "a" ? "warn" : "bad"}`}>
                  {overCollat === Infinity ? "INF" : overCollatDisplay}
                </div>
                <div className="ml">TVL {fmt(totalCollateralValue)}</div>
              </div>
            </div>

            <div className="section grid g32">
              <div className="card" style={{ padding: 0 }}>
                <div className="card-hdr" style={{ padding: "12px 14px 0" }}>
                  <span className="label">
                    <span className="dot dg" /> Mark vs Index Price
                  </span>
                  <Badge text={`${chartData?.length || 0} POINTS`} type={hasHistory ? "c" : "a"} />
                </div>
                <PriceChart data={chartData} />
              </div>
              <div className="card">
                <div className="card-hdr">
                  <span>Simulation Readiness</span>
                  <Badge text={readinessRows.every((r) => r[1]) ? "PASS" : "CHECK"} type={readinessRows.every((r) => r[1]) ? "g" : "a"} />
                </div>
                <table className="tbl">
                  <tbody>
                    {readinessRows.map(([name, ok, detail]) => (
                      <tr key={name}>
                        <td>
                          <span className={`dot ${ok ? "dg" : "da"}`} />{" "}
                          {name}
                        </td>
                        <td className="r muted">{detail}</td>
                        <td className="r">
                          <Badge text={ok ? "OK" : "WARN"} type={ok ? "g" : "a"} />
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="tbl-footer">
                  <span>normalization factor: <span className="info">{nfText}</span></span>
                  <span>active brokers: <span className="good">{activeBrokers}</span> / {bps.length}</span>
                </div>
              </div>
            </div>

            <div className="section grid g23">
              <div className="card">
                <div className="card-hdr">
                  <span>Market Architecture</span>
                  <Badge text={hookless ? "HOOKLESS V4" : "HOOKED POOL"} type={hookless ? "g" : "a"} />
                </div>
                <div className="kv">
                  {marketRows.map(([key, value]) => (
                    <div className="kv-row" key={key}>
                      <div className="kv-k">{key}</div>
                      <div className="kv-v">{value || "-"}</div>
                    </div>
                  ))}
                </div>
              </div>
              <div className="card">
                <div className="card-hdr">
                  <span>Pool State</span>
                  <Badge text={ps.liquidity ? "ACTIVE" : "NO DATA"} type={ps.liquidity ? "g" : "a"} />
                </div>
                <div className="grid g3">
                  {poolRows.map(([label, value]) => (
                    <div className="card" key={label}>
                      <div className="card-hdr">
                        <span>{label}</span>
                      </div>
                      <div className="mv" style={{ fontSize: 18 }}>
                        {value}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="section card" style={{ padding: 0 }}>
              <div className="card-hdr" style={{ padding: "12px 14px 0" }}>
                <span>Broker Positions</span>
                <Badge text={`${bps.length} BROKERS`} type="p" />
              </div>
              <div className="tbl-wrap">
                <table className="tbl">
                  <thead>
                    <tr>
                      <th>Broker</th>
                      <th className="r">Collateral</th>
                      <th className="r">Debt</th>
                      <th className="r">Debt Value</th>
                      <th className="r">Health</th>
                      <th className="r">State</th>
                    </tr>
                  </thead>
                  <tbody>
                    {bps.map((b, i) => {
                      const coll = Number(b.collateral || 0);
                      const debt = Number(b.debt || 0);
                      const debtVal = Number(b.debt_value || 0);
                      const hf = Number(b.health_factor || 0);
                      const hasDebt = debt > 0 || debtVal > 0;
                      const state = !hasDebt
                        ? "IDLE"
                        : hf > 2
                          ? "SAFE"
                          : hf > 1.2
                            ? "WATCH"
                            : "DANGER";
                      const type =
                        state === "SAFE" || state === "IDLE"
                          ? "g"
                          : state === "WATCH"
                            ? "a"
                            : "r";
                      return (
                        <tr key={i}>
                          <td className="info mono">{fmtAddr(b.broker_address)}</td>
                          <td className="r">{fmt(coll)}</td>
                          <td className={`r ${hasDebt ? "warn" : "muted"}`}>
                            {hasDebt ? `${fmtN(debt)} wRLP` : "-"}
                          </td>
                          <td className={`r ${debtVal > 0 ? "warn" : "muted"}`}>
                            {debtVal > 0 ? fmt(debtVal) : "-"}
                          </td>
                          <td className={`r ${type === "g" ? "good" : type === "a" ? "warn" : "bad"}`}>
                            {!hasDebt ? "INF" : hf.toFixed(2)}
                          </td>
                          <td className="r">
                            <Badge text={state} type={type} />
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div className="tbl-footer">
                  <span>collateral: <span className="good">{fmt(totalCollateral)}</span></span>
                  <span>broker debt: <span className={totalBrokerDebt > 0 ? "warn" : "muted"}>{fmtN(totalBrokerDebt)} wRLP</span></span>
                  <span>over-collat: <span className={riskType === "g" ? "good" : riskType === "a" ? "warn" : "bad"}>{overCollat === Infinity ? "INF" : overCollatDisplay}</span></span>
                </div>
              </div>
            </div>

            <div className="section grid g2">
              <div className="card">
                <div className="card-hdr">
                  <span>Execution Activity</span>
                  <Badge text={`${swaps.length} SWAPS`} type="c" />
                </div>
                <div className="grid g3">
                  <div>
                    <div className="mv info">{fmt(totalVol)}</div>
                    <div className="ml">swap volume</div>
                  </div>
                  <div>
                    <div className="mv">{protocolEvents.length}</div>
                    <div className="ml">protocol events</div>
                  </div>
                  <div>
                    <div className="mv good">{activeBrokers}</div>
                    <div className="ml">active brokers</div>
                  </div>
                </div>
              </div>
              <div className="card">
                <div className="card-hdr">
                  <span>Recent Events</span>
                  <Badge text={`${displayEvents.length} SHOWN`} type="c" />
                </div>
                <div className="evt-list">
                  {displayEvents.map((e, i) => {
                    const summary = summarizeEvent(e);
                    return (
                      <div className="evt" key={i}>
                        <span>
                          <Badge text={summary.badge} type={summary.type} />
                        </span>
                        <span className="muted">{fmtTs(e.block_timestamp)}</span>
                        <span className="muted">blk {e.block_number?.toLocaleString()}</span>
                        <span className={summary.tone}>
                          {summary.label}: {summary.detail}
                        </span>
                      </div>
                    );
                  })}
                  {displayEvents.length === 0 && (
                    <div className="muted" style={{ padding: "16px 0" }}>
                      No simulation events indexed yet.
                    </div>
                  )}
                  {protocolEvents.length < events.length && (
                    <div className="muted" style={{ padding: "10px 0 0" }}>
                      {events.length - protocolEvents.length} low-level token transfer logs hidden.
                    </div>
                  )}
                </div>
              </div>
            </div>

            <div className="ftr">
              <span>RLD Protocol / Simulation Monitor v4.0</span>
              <span>auto-refresh 10s / NF {nfText}</span>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);    </script>
  </body>
</html>
