# ═══════════════════════════════════════════════════════════════
# Telegram Monitor Bot (standalone)
# ═══════════════════════════════════════════════════════════════
# Polls Telegram for /start and /status commands, sends hourly
# reports with rates, block lag, and ETH price.
#
#  Usage:
#    docker compose -f docker/docker-compose.bot.yml up -d
#
#  Health:
#    http://localhost:8082/
#
#  Requires: rates-indexer running on port 8081
# ═══════════════════════════════════════════════════════════════

services:
  monitor-bot:
    build:
      context: ..
      dockerfile: backend/Dockerfile.bot
    ports:
      - "${BOT_PORT:-8082}:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - RATES_API_URL=http://rates-indexer:8080
      - SIM_API_URL=http://indexer:8080
      - MAINNET_RPC_URL=${BOT_RPC_URL:-https://eth.llamarpc.com}
      - API_KEY=${API_KEY:-}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
