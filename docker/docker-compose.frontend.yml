name: rld-frontend

services:
  frontend:
    container_name: rld-frontend
    image: nginx:1.27.5-alpine
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    volumes:
      - /home/ubuntu/RLD/frontend/dist:/usr/share/nginx/html:ro
      - /home/ubuntu/RLD/frontend/public/fonts.css:/usr/share/nginx/html/fonts.css:ro
      - /home/ubuntu/RLD/frontend/public/fonts:/usr/share/nginx/html/fonts:ro
      - /home/ubuntu/RLD/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      com.rld.owner: "frontend"
      com.rld.service: "frontend"
      com.rld.tier: "edge"
      com.rld.persistence: "none"
      com.rld.description: "Nginx container serving the built Vite SPA and internal API proxy routes"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  default:
    name: rld_shared
    external: true
