name: rld-clickhouse

services:
  clickhouse:
    container_name: rld_clickhouse
    image: clickhouse/clickhouse-server:${CLICKHOUSE_IMAGE_TAG:-26.3.7.8}
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - /mnt/data/clickhouse/data:/var/lib/clickhouse
      - /mnt/data/clickhouse/log:/var/log/clickhouse-server
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    deploy:
      resources:
        limits:
          memory: 12G
    restart: unless-stopped
    labels:
      com.rld.owner: "data-platform"
      com.rld.service: "clickhouse"
      com.rld.tier: "database"
      com.rld.persistence: "bind:/mnt/data/clickhouse"
      com.rld.description: "Persistent ClickHouse store for rates analytics and protocol-derived tables"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user \"$$CLICKHOUSE_USER\" --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1' >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

networks:
  default:
    name: rld_shared
    external: true
