# RLD Infrastructure Dashboard — Internal Only
# Serves dashboard on port 8090, accessible via http://<IP>:8090
# No CSP restrictions, no external access (unless UFW allows it)

server {
    listen 8090;
    server_name _;

    root /home/ubuntu/RLD/dashboard;
    index index.html;

    # No security headers needed — internal tool
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # CORS for status.json (in case of local dev)
    location = /status.json {
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    access_log off;
}
