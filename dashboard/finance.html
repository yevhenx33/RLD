<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RLD // SIMULATION</title>
    <script
      src="https://unpkg.com/react@18/umd/react.production.min.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #06080a;
        --s1: #0c0e12;
        --s2: #12151a;
        --bdr: #1c2028;
        --t: #c8ccd4;
        --tb: #e2e5ea;
        --td: #4a5060;
        --tw: #f0f2f5;
        --g: #00ff88;
        --g20: rgba(0, 255, 136, 0.12);
        --r: #ff4466;
        --r20: rgba(255, 68, 102, 0.12);
        --a: #ffaa22;
        --a20: rgba(255, 170, 34, 0.12);
        --c: #38bdf8;
        --c20: rgba(56, 189, 248, 0.12);
        --p: #a78bfa;
        --p20: rgba(167, 139, 250, 0.12);
      }
      html {
        font-size: 15px;
      }
      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg);
        color: var(--t);
        min-height: 100vh;
        line-height: 1.5;
        overflow-x: hidden;
      }

      /* ── Scanline overlay ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 136, 0.003) 2px,
          rgba(0, 255, 136, 0.003) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* ── Animations ── */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* ── Layout ── */
      .dash {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px 24px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--bdr);
        margin-bottom: 20px;
      }
      .header-left {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .logo {
        font-size: 22px;
        font-weight: 700;
        color: var(--g);
        text-shadow: 0 0 16px rgba(0, 255, 136, 0.3);
      }
      .logo-sub {
        font-size: 12px;
        color: var(--td);
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 12px;
        color: var(--td);
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--bdr);
      }
      .tab {
        padding: 8px 20px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--td);
        text-decoration: none;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }
      .tab:hover {
        color: var(--t);
      }
      .tab.active {
        color: var(--c);
        border-bottom-color: var(--c);
      }

      /* ── Section ── */
      .section {
        margin-bottom: 24px;
        animation: fadeIn 0.4s ease both;
      }
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .section-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--td);
      }

      /* ── Hero metrics ── */
      .hero {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 2px;
        margin-bottom: 24px;
      }
      @media (max-width: 768px) {
        .hero {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      .metric {
        background: var(--s1);
        border: 1px solid var(--bdr);
        padding: 20px 24px;
        animation: fadeIn 0.4s ease both;
      }
      .metric-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--td);
        margin-bottom: 8px;
      }
      .metric-value {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: -1px;
        line-height: 1.1;
      }
      .metric-sub {
        font-size: 12px;
        color: var(--td);
        margin-top: 4px;
      }

      /* ── Badge ── */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 2px;
      }
      .b-g {
        background: var(--g20);
        color: var(--g);
        border: 1px solid rgba(0, 255, 136, 0.15);
      }
      .b-r {
        background: var(--r20);
        color: var(--r);
        border: 1px solid rgba(255, 68, 102, 0.15);
      }
      .b-a {
        background: var(--a20);
        color: var(--a);
        border: 1px solid rgba(255, 170, 34, 0.15);
      }
      .b-c {
        background: var(--c20);
        color: var(--c);
        border: 1px solid rgba(56, 189, 248, 0.15);
      }
      .b-p {
        background: var(--p20);
        color: var(--p);
        border: 1px solid rgba(167, 139, 250, 0.15);
      }

      /* ── Chart ── */
      .chart-wrap {
        position: relative;
        height: 420px;
        border: 1px solid var(--bdr);
        background: var(--s1);
        overflow: hidden;
      }
      .chart-svg {
        width: 100%;
        height: 100%;
      }
      .legend {
        display: flex;
        gap: 16px;
        font-size: 10px;
        color: var(--td);
      }
      .legend-dot {
        width: 10px;
        height: 3px;
        border-radius: 1px;
        display: inline-block;
        margin-right: 5px;
      }

      /* ── Table ── */
      .tbl {
        width: 100%;
        border-collapse: collapse;
      }
      .tbl th {
        padding: 10px 12px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--td);
        text-align: left;
        border-bottom: 1px solid var(--bdr);
      }
      .tbl th.r {
        text-align: right;
      }
      .tbl td {
        padding: 12px 12px;
        font-size: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        white-space: nowrap;
      }
      .tbl td.r {
        text-align: right;
      }
      .tbl tr:hover td {
        background: rgba(255, 255, 255, 0.02);
      }
      .tbl-card {
        background: var(--s1);
        border: 1px solid var(--bdr);
        overflow: hidden;
      }
      .tbl-footer {
        display: flex;
        justify-content: space-between;
        padding: 12px 12px;
        font-size: 12px;
        color: var(--td);
        border-top: 1px solid var(--bdr);
      }

      /* ── Events ── */
      .evt {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        font-size: 12px;
        animation: fadeIn 0.3s ease both;
      }
      .evt-type {
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        border-radius: 2px;
        width: 84px;
        text-align: center;
        flex-shrink: 0;
      }
      .evt-swap {
        background: var(--c20);
        color: var(--c);
        border: 1px solid rgba(56, 189, 248, 0.15);
      }
      .evt-transfer {
        background: var(--p20);
        color: var(--p);
        border: 1px solid rgba(167, 139, 250, 0.15);
      }
      .evt-other {
        background: rgba(255, 255, 255, 0.03);
        color: var(--td);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .events-card {
        background: var(--s1);
        border: 1px solid var(--bdr);
        padding: 16px;
      }

      /* ── Footer ── */
      .footer {
        text-align: center;
        padding: 16px;
        font-size: 11px;
        color: var(--td);
        border-top: 1px solid var(--bdr);
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useCallback, useMemo } = React;

      // ══════════════════ UTILS ══════════════════
      const fmt = (v, d = 2) => {
        if (v === undefined || v === null || v === "") return "—";
        const n = Number(v);
        if (isNaN(n)) return v;
        if (Math.abs(n) >= 1e9) return "$" + (n / 1e9).toFixed(d) + "B";
        if (Math.abs(n) >= 1e6) return "$" + (n / 1e6).toFixed(d) + "M";
        if (Math.abs(n) >= 1e3)
          return (
            "$" +
            n.toLocaleString(undefined, {
              minimumFractionDigits: d,
              maximumFractionDigits: d,
            })
          );
        return "$" + n.toFixed(d);
      };
      const fmtN = (n, d = 2) => {
        if (n === undefined || n === null || n === "") return "—";
        const v = Number(n);
        if (isNaN(v)) return n;
        if (v >= 1e9) return (v / 1e9).toFixed(d) + "B";
        if (v >= 1e6) return (v / 1e6).toFixed(d) + "M";
        if (v >= 1e3) return v.toLocaleString();
        return v.toFixed(d);
      };
      const fmtPct = (v, d = 2) => {
        if (v === undefined || v === null) return "—";
        return (v >= 0 ? "+" : "") + Number(v).toFixed(d) + "%";
      };
      const fmtAddr = (a) => (a ? `${a.slice(0, 6)}…${a.slice(-4)}` : "—");
      const fmtTs = (ts) => {
        if (!ts) return "—";
        const d = new Date(ts * 1000);
        return d.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      };
      const fromRaw = (v, decimals = 6) => {
        if (!v && v !== 0) return 0;
        return Number(v) / Math.pow(10, decimals);
      };

      // ══════════════════ COMPONENTS ══════════════════
      const Badge = ({ text, type }) => (
        <span className={`badge b-${type}`}>{text}</span>
      );

      // ── Price Chart ──
      const PriceChart = ({ data }) => {
        if (!data || data.length < 2)
          return (
            <div
              style={{
                height: 420,
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                color: "var(--td)",
              }}
            >
              <span
                style={{ animation: "pulse 1.5s ease infinite", fontSize: 13 }}
              >
                Loading price history…
              </span>
            </div>
          );

        const marks = data
          .map((d) => d.mark_price)
          .filter((v) => v != null && v > 0);
        const idxs = data
          .map((d) => d.index_price)
          .filter((v) => v != null && v > 0);
        const allPrices = [...marks, ...idxs];
        const mn = Math.min(...allPrices);
        const mx = Math.max(...allPrices);
        const range = mx - mn || 0.01;

        const w = 1400,
          h = 420,
          padL = 70,
          padR = 24,
          padT = 48,
          padB = 36;
        const cw = w - padL - padR,
          ch = h - padT - padB;
        const toX = (i) => padL + (i / (data.length - 1)) * cw;
        const toY = (v) => padT + ch - ((v - mn) / range) * ch;

        let markPath = "",
          idxPath = "";
        data.forEach((d, i) => {
          const x = toX(i);
          if (d.mark_price > 0) {
            const y = toY(d.mark_price);
            markPath += (markPath ? "L" : "M") + `${x},${y} `;
          }
          if (d.index_price > 0) {
            const y = toY(d.index_price);
            idxPath += (idxPath ? "L" : "M") + `${x},${y} `;
          }
        });

        const ySteps = 6;
        const yLabels = [];
        for (let i = 0; i <= ySteps; i++) {
          const v = mn + (range / ySteps) * i;
          yLabels.push({ y: toY(v), label: "$" + v.toFixed(4) });
        }

        const xLabels = [];
        const step = Math.max(1, Math.floor(data.length / 6));
        for (let i = 0; i < data.length; i += step) {
          const d = data[i];
          if (d.timestamp) {
            const dt = new Date(d.timestamp * 1000);
            xLabels.push({
              x: toX(i),
              label: dt.toLocaleTimeString("en-GB", {
                hour: "2-digit",
                minute: "2-digit",
              }),
            });
          }
        }

        const latestMark = marks[marks.length - 1];
        const latestIdx = idxs[idxs.length - 1];

        return (
          <div className="chart-wrap">
            <svg
              className="chart-svg"
              viewBox={`0 0 ${w} ${h}`}
              preserveAspectRatio="none"
            >
              <defs>
                <linearGradient id="mg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="var(--c)" stopOpacity="0.06" />
                  <stop offset="100%" stopColor="var(--c)" stopOpacity="0" />
                </linearGradient>
              </defs>
              {yLabels.map((yl, i) => (
                <g key={i}>
                  <line
                    x1={padL}
                    y1={yl.y}
                    x2={w - padR}
                    y2={yl.y}
                    stroke="var(--bdr)"
                    strokeWidth="0.5"
                  />
                  <text
                    x={padL - 8}
                    y={yl.y + 4}
                    textAnchor="end"
                    fill="var(--td)"
                    fontSize="10"
                    fontFamily="JetBrains Mono"
                  >
                    {yl.label}
                  </text>
                </g>
              ))}
              {xLabels.map((xl, i) => (
                <text
                  key={i}
                  x={xl.x}
                  y={h - 10}
                  textAnchor="middle"
                  fill="var(--td)"
                  fontSize="10"
                  fontFamily="JetBrains Mono"
                >
                  {xl.label}
                </text>
              ))}
              <path
                d={idxPath}
                fill="none"
                stroke="var(--p)"
                strokeWidth="1.5"
                strokeOpacity="0.6"
                vectorEffect="non-scaling-stroke"
              />
              <path
                d={markPath}
                fill="none"
                stroke="var(--c)"
                strokeWidth="2"
                vectorEffect="non-scaling-stroke"
              />
              {latestMark > 0 && (
                <circle
                  cx={toX(data.length - 1)}
                  cy={toY(latestMark)}
                  r="4"
                  fill="var(--c)"
                  stroke="var(--bg)"
                  strokeWidth="1.5"
                />
              )}
              {latestIdx > 0 && (
                <circle
                  cx={toX(data.length - 1)}
                  cy={toY(latestIdx)}
                  r="3"
                  fill="var(--p)"
                  stroke="var(--bg)"
                  strokeWidth="1.5"
                />
              )}
            </svg>
            <div style={{ position: "absolute", top: 12, left: padL + 12 }}>
              <div className="legend">
                <span>
                  <span
                    className="legend-dot"
                    style={{ background: "var(--c)" }}
                  />
                  MARK PRICE
                </span>
                <span>
                  <span
                    className="legend-dot"
                    style={{ background: "var(--p)" }}
                  />
                  INDEX PRICE
                </span>
              </div>
            </div>
            <div
              style={{
                position: "absolute",
                top: 10,
                right: 16,
                textAlign: "right",
              }}
            >
              <div style={{ fontSize: 11, color: "var(--td)" }}>
                MARK{" "}
                <span
                  style={{ color: "var(--c)", fontWeight: 600, fontSize: 18 }}
                >
                  ${latestMark?.toFixed(4)}
                </span>
              </div>
              <div style={{ fontSize: 11, color: "var(--td)", marginTop: 2 }}>
                INDEX{" "}
                <span
                  style={{ color: "var(--p)", fontWeight: 600, fontSize: 18 }}
                >
                  ${latestIdx?.toFixed(4)}
                </span>
              </div>
            </div>
            <div
              style={{
                position: "absolute",
                bottom: padB + 8,
                left: padL + 12,
                fontSize: 10,
                color: "var(--td)",
              }}
            >
              {data.length} blocks · {data[0].block_number?.toLocaleString()} →{" "}
              {data[data.length - 1].block_number?.toLocaleString()}
            </div>
          </div>
        );
      };

      // ══════════════════ MAIN APP ══════════════════
      function App() {
        const [latest, setLatest] = useState(null);
        const [chartData, setChartData] = useState(null);
        const [events, setEvents] = useState([]);
        const [err, setErr] = useState(null);
        const [tick, setTick] = useState(0);
        const [now, setNow] = useState(new Date());

        const loadLatest = useCallback(() => {
          fetch("/api/latest")
            .then((r) => r.json())
            .then((d) => {
              setLatest(d);
              setErr(null);
            })
            .catch((e) => setErr(e.message));
        }, []);
        const loadChart = useCallback(() => {
          fetch("/api/chart/price?limit=1000")
            .then((r) => r.json())
            .then((d) => {
              if (d && d.data) setChartData(d.data);
            })
            .catch(() => {});
        }, []);
        const loadEvents = useCallback(() => {
          fetch("/api/events?limit=1000")
            .then((r) => r.json())
            .then((d) => {
              if (Array.isArray(d)) setEvents(d);
            })
            .catch(() => {});
        }, []);

        useEffect(() => {
          loadLatest();
          loadChart();
          loadEvents();
          const iv1 = setInterval(loadLatest, 10000);
          const iv2 = setInterval(loadChart, 60000);
          const iv3 = setInterval(loadEvents, 30000);
          return () => {
            clearInterval(iv1);
            clearInterval(iv2);
            clearInterval(iv3);
          };
        }, [loadLatest, loadChart, loadEvents]);

        useEffect(() => {
          const iv = setInterval(() => {
            setTick((t) => t + 1);
            setNow(new Date());
          }, 1000);
          return () => clearInterval(iv);
        }, []);

        if (err && !latest)
          return (
            <div
              className="dash"
              style={{ paddingTop: 80, textAlign: "center" }}
            >
              <div style={{ color: "var(--r)", fontSize: 16, fontWeight: 600 }}>
                ✗ SIM INDEXER UNAVAILABLE
              </div>
              <div style={{ color: "var(--td)", marginTop: 8, fontSize: 13 }}>
                {err}
              </div>
            </div>
          );
        if (!latest)
          return (
            <div
              className="dash"
              style={{ paddingTop: 80, textAlign: "center" }}
            >
              <span
                style={{
                  color: "var(--g)",
                  fontSize: 14,
                  animation: "pulse 1.5s ease infinite",
                }}
              >
                ▌ LOADING SIMULATION DATA…
              </span>
            </div>
          );

        // ── Parse latest ──
        const ms = latest.market_states?.[0] || latest.market_state || {};
        const ps = latest.pool_states?.[0] || latest.pool_state || {};
        const bps = latest.broker_positions || [];

        const markPrice = ps.mark_price || 0;
        const indexPrice = ms.index_price ? fromRaw(ms.index_price, 18) : 0;
        const normFactor = ms.normalization_factor
          ? Number(ms.normalization_factor) / 1e18
          : 1;
        const totalDebt = fromRaw(ms.total_debt, 6);

        const totalCollateral = bps.reduce(
          (a, b) => a + fromRaw(b.collateral, 6),
          0,
        );
        const totalBrokerDebt = bps.reduce((a, b) => a + fromRaw(b.debt, 6), 0);
        const totalCollateralValue = bps.reduce(
          (a, b) => a + fromRaw(b.collateral_value, 6),
          0,
        );
        const totalDebtValue = bps.reduce(
          (a, b) => a + fromRaw(b.debt_value, 6),
          0,
        );

        const overCollat =
          totalDebtValue > 0
            ? totalCollateralValue / totalDebtValue
            : totalCollateralValue > 0
              ? Infinity
              : 0;
        const overCollatDisplay =
          overCollat === Infinity
            ? "∞"
            : overCollat > 0
              ? (overCollat * 100).toFixed(1) + "%"
              : "—";
        const pegDev =
          indexPrice > 0 ? ((markPrice - indexPrice) / indexPrice) * 100 : 0;

        const swaps = events.filter((e) => e.event_name === "Swap");
        const totalVol = swaps.reduce(
          (a, e) => a + Math.abs(fromRaw(e.event_data?.amount1 || "0", 6)),
          0,
        );

        return (
          <div className="dash">
            {/* ═══ HEADER ═══ */}
            <div className="header">
              <div className="header-left">
                <span className="logo">RLD</span>
                <span className="logo-sub">simulation monitor</span>
              </div>
              <div className="header-right">
                <span>
                  block{" "}
                  <span style={{ color: "var(--c)" }}>
                    {latest.block_number?.toLocaleString()}
                  </span>
                </span>
                <span>{now.toLocaleTimeString("en-GB")}</span>
                <span
                  style={{
                    color: "var(--g)",
                    animation: "blink 1.2s step-end infinite",
                  }}
                >
                  ▌
                </span>
              </div>
            </div>

            {/* ═══ TABS ═══ */}
            <div className="tabs">
              <a className="tab" href="/">
                INFRA STATUS
              </a>
              <a className="tab active" href="/finance.html">
                SIMULATION
              </a>
            </div>

            {/* ═══ SECTION 1: HERO METRICS ═══ */}
            <div className="hero">
              <div className="metric" style={{ animationDelay: "0ms" }}>
                <div className="metric-label">Mark Price</div>
                <div className="metric-value" style={{ color: "var(--c)" }}>
                  {fmt(markPrice, 4)}
                </div>
                <div className="metric-sub">wRLP / aUSDC</div>
              </div>
              <div className="metric" style={{ animationDelay: "40ms" }}>
                <div className="metric-label">
                  Index Price
                  <span style={{ marginLeft: 8 }}>
                    <Badge
                      text={fmtPct(pegDev)}
                      type={
                        Math.abs(pegDev) < 1
                          ? "g"
                          : Math.abs(pegDev) < 5
                            ? "a"
                            : "r"
                      }
                    />
                  </span>
                </div>
                <div className="metric-value" style={{ color: "var(--p)" }}>
                  {fmt(indexPrice, 4)}
                </div>
                <div className="metric-sub">oracle · peg deviation</div>
              </div>
              <div className="metric" style={{ animationDelay: "80ms" }}>
                <div className="metric-label">Total Debt</div>
                <div
                  className="metric-value"
                  style={{ color: totalDebt > 0 ? "var(--a)" : "var(--tb)" }}
                >
                  {fmtN(totalDebt)}{" "}
                  <span
                    style={{
                      fontSize: 16,
                      fontWeight: 400,
                      color: "var(--td)",
                    }}
                  >
                    wRLP
                  </span>
                </div>
                {totalDebtValue > 0 && (
                  <div className="metric-sub">≈ {fmt(totalDebtValue)}</div>
                )}
              </div>
              <div className="metric" style={{ animationDelay: "120ms" }}>
                <div className="metric-label">
                  System Health
                  <span style={{ marginLeft: 8 }}>
                    <Badge
                      text={
                        overCollat === Infinity || overCollat === 0
                          ? "NO DEBT"
                          : overCollat >= 1.5
                            ? "SAFE"
                            : overCollat >= 1.2
                              ? "WATCH"
                              : "DANGER"
                      }
                      type={
                        overCollat === Infinity ||
                        overCollat === 0 ||
                        overCollat >= 1.5
                          ? "g"
                          : overCollat >= 1.2
                            ? "a"
                            : "r"
                      }
                    />
                  </span>
                </div>
                <div
                  className="metric-value"
                  style={{
                    color:
                      overCollat >= 1.5 || overCollat === Infinity
                        ? "var(--g)"
                        : overCollat >= 1.2
                          ? "var(--a)"
                          : "var(--r)",
                  }}
                >
                  {overCollatDisplay}
                </div>
                <div className="metric-sub">
                  TVL {fmt(totalCollateralValue)} · O/C ratio
                </div>
              </div>
            </div>

            {/* ═══ SECTION 2: PRICE CHART ═══ */}
            <div className="section">
              <div className="section-header">
                <span className="section-title">Mark vs Index Price</span>
                {chartData && (
                  <Badge text={`${chartData.length} BLOCKS`} type="c" />
                )}
              </div>
              <PriceChart data={chartData} />
            </div>

            {/* ═══ SECTION 3: BROKER POSITIONS ═══ */}
            <div className="section">
              <div className="section-header">
                <span className="section-title">Broker Positions</span>
                <Badge text={`${bps.length} BROKERS`} type="p" />
              </div>
              <div className="tbl-card">
                <table className="tbl">
                  <thead>
                    <tr>
                      <th>Broker</th>
                      <th className="r">Collateral</th>
                      <th className="r">Debt (wRLP)</th>
                      <th className="r">Debt Value</th>
                      <th className="r">Health Factor</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {bps.map((b, i) => {
                      const coll = fromRaw(b.collateral, 6);
                      const debt = fromRaw(b.debt, 6);
                      const debtVal = fromRaw(b.debt_value, 6);
                      const hf = b.health_factor;
                      const hasDebt = debt > 0 || debtVal > 0;
                      const status = !hasDebt
                        ? "idle"
                        : hf > 2
                          ? "safe"
                          : hf > 1.2
                            ? "watch"
                            : "danger";
                      return (
                        <tr key={i}>
                          <td
                            style={{
                              color: "var(--c)",
                              fontFamily: "JetBrains Mono",
                              fontSize: 12,
                            }}
                          >
                            {fmtAddr(b.broker_address)}
                          </td>
                          <td
                            className="r"
                            style={{ color: "var(--tb)", fontWeight: 500 }}
                          >
                            {fmt(coll)}
                          </td>
                          <td
                            className="r"
                            style={{
                              color: hasDebt ? "var(--a)" : "var(--td)",
                            }}
                          >
                            {hasDebt ? fmtN(debt) + " wRLP" : "—"}
                          </td>
                          <td
                            className="r"
                            style={{
                              color: debtVal > 0 ? "var(--a)" : "var(--td)",
                              fontSize: 12,
                            }}
                          >
                            {debtVal > 0 ? fmt(debtVal) : "—"}
                          </td>
                          <td
                            className="r"
                            style={{
                              color: !hasDebt
                                ? "var(--td)"
                                : hf > 2
                                  ? "var(--g)"
                                  : hf > 1.2
                                    ? "var(--a)"
                                    : "var(--r)",
                              fontWeight: 600,
                              fontSize: 16,
                            }}
                          >
                            {!hasDebt ? "∞" : hf.toFixed(2)}
                          </td>
                          <td>
                            <Badge
                              text={status.toUpperCase()}
                              type={
                                status === "safe" || status === "idle"
                                  ? "g"
                                  : status === "watch"
                                    ? "a"
                                    : "r"
                              }
                            />
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div className="tbl-footer">
                  <span>
                    total collateral:{" "}
                    <span style={{ color: "var(--g)" }}>
                      {fmt(totalCollateral)}
                    </span>
                  </span>
                  <span>
                    total debt:{" "}
                    <span
                      style={{
                        color: totalBrokerDebt > 0 ? "var(--a)" : "var(--td)",
                      }}
                    >
                      {fmtN(totalBrokerDebt)} wRLP
                    </span>
                    {totalDebtValue > 0 && (
                      <span style={{ color: "var(--td)", marginLeft: 6 }}>
                        ({fmt(totalDebtValue)})
                      </span>
                    )}
                  </span>
                  <span>
                    over-collat:{" "}
                    <span style={{ color: "var(--g)" }}>
                      {overCollatDisplay}
                    </span>
                  </span>
                </div>
              </div>
            </div>

            {/* ═══ SECTION 4: EVENTS ═══ */}
            <div className="section">
              <div className="section-header">
                <span className="section-title">Recent Events</span>
                <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                  <span style={{ fontSize: 12, color: "var(--td)" }}>
                    vol {fmt(totalVol)} · {swaps.length} swaps
                  </span>
                  <Badge text={`${events.length} TOTAL`} type="c" />
                </div>
              </div>
              <div className="events-card">
                <div style={{ maxHeight: 360, overflowY: "auto" }}>
                  {events.map((e, i) => {
                    const isSwap = e.event_name === "Swap";
                    const isTransfer = e.event_name === "Transfer";
                    return (
                      <div
                        key={i}
                        className="evt"
                        style={{ animationDelay: `${Math.min(i, 20) * 12}ms` }}
                      >
                        <span
                          className={`evt-type ${isSwap ? "evt-swap" : isTransfer ? "evt-transfer" : "evt-other"}`}
                        >
                          {e.event_name}
                        </span>
                        <span
                          style={{
                            color: "var(--td)",
                            fontSize: 11,
                            minWidth: 60,
                          }}
                        >
                          {fmtTs(e.block_timestamp)}
                        </span>
                        <span
                          style={{
                            color: "var(--td)",
                            fontSize: 11,
                            minWidth: 90,
                          }}
                        >
                          blk {e.block_number?.toLocaleString()}
                        </span>
                        {isSwap && (
                          <>
                            <span
                              style={{
                                color:
                                  Number(e.event_data?.amount0) > 0
                                    ? "var(--g)"
                                    : "var(--r)",
                                fontWeight: 600,
                                fontSize: 12,
                                minWidth: 36,
                              }}
                            >
                              {Number(e.event_data?.amount0) > 0
                                ? "BUY"
                                : "SELL"}
                            </span>
                            <span style={{ fontSize: 12, color: "var(--tb)" }}>
                              {fmtN(
                                Math.abs(
                                  fromRaw(e.event_data?.amount1 || "0", 6),
                                ),
                              )}{" "}
                              aUSDC
                            </span>
                          </>
                        )}
                        {isTransfer && (
                          <>
                            <span style={{ fontSize: 11, color: "var(--td)" }}>
                              {fmtAddr(e.event_data?.from)} →{" "}
                              {fmtAddr(e.event_data?.to)}
                            </span>
                            <span style={{ fontSize: 12, color: "var(--tb)" }}>
                              {fmtN(
                                Math.abs(
                                  fromRaw(e.event_data?.value || "0", 18),
                                ),
                                4,
                              )}
                            </span>
                          </>
                        )}
                        {!isSwap && !isTransfer && (
                          <span style={{ fontSize: 11, color: "var(--td)" }}>
                            {JSON.stringify(e.event_data).slice(0, 80)}…
                          </span>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* ═══ FOOTER ═══ */}
            <div className="footer">
              RLD Protocol · Simulation Monitor v3.0 · auto-refresh 10s · NF{" "}
              {normFactor.toFixed(6)} · next update in{" "}
              <span style={{ color: "var(--c)" }}>{10 - (tick % 10)}s</span>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
