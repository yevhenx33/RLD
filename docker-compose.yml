version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rate-dashboard-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      - ./backend/clean_rates.db:/app/clean_rates.db # Mount DB if needed, or rely on copy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rate-dashboard-frontend
    ports:
      - "3000:8080" # Map host 3000 to container 8080 (Cloud Run port)
    depends_on:
      - backend
    restart: unless-stopped
