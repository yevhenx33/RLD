      - CLICKHOUSE_WAIT_FOR_ASYNC_INSERT=${CLICKHOUSE_WAIT_FOR_ASYNC_INSERT:-true}
      - MORPHO_RPC_ANCHOR_INTERVAL_SEC=${MORPHO_RPC_ANCHOR_INTERVAL_SEC:-86400}
      - MORPHO_RPC_ANCHOR_GAP_BLOCKS=${MORPHO_RPC_ANCHOR_GAP_BLOCKS:-7200}
      - MORPHO_RPC_ANCHOR_GAP_BATCH_BLOCKS=${MORPHO_RPC_ANCHOR_GAP_BATCH_BLOCKS:-500}
      - MORPHO_RPC_ANCHOR_MAX_DIFF_ROWS=${MORPHO_RPC_ANCHOR_MAX_DIFF_ROWS:-5000}
      - INDEXER_VERSION=${INDEXER_VERSION:-dev}
      - PYTHONDONTWRITEBYTECODE=1
    command:
      [
        "sh",
        "-c",
        "while true; do python -m analytics.scripts.rld_indexer morpho-anchor --block-mode processed --gap-audit-blocks $${MORPHO_RPC_ANCHOR_GAP_BLOCKS:-7200} --gap-batch-blocks $${MORPHO_RPC_ANCHOR_GAP_BATCH_BLOCKS:-500} --max-diff-rows $${MORPHO_RPC_ANCHOR_MAX_DIFF_ROWS:-5000}; sleep $${MORPHO_RPC_ANCHOR_INTERVAL_SEC:-86400}; done"
      ]
    labels:
      com.rld.owner: "data-platform"
      com.rld.service: "morpho-rpc-anchor-worker"
      com.rld.tier: "analytics"
      com.rld.persistence: "clickhouse"
