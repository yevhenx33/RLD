      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_WORKER_PASSWORD:-${CLICKHOUSE_PASSWORD:-}}
      - CLICKHOUSE_CONNECT_TIMEOUT=5
      - CLICKHOUSE_SEND_RECEIVE_TIMEOUT=30
      - CLICKHOUSE_QUERY_RETRIES=1
      - CLICKHOUSE_AUTOGENERATE_SESSION_ID=false
      - CLICKHOUSE_INSERT_BATCH_SIZE=${CLICKHOUSE_INSERT_BATCH_SIZE:-20000}
      - CLICKHOUSE_ASYNC_INSERT=${CLICKHOUSE_ASYNC_INSERT:-true}
      - CLICKHOUSE_WAIT_FOR_ASYNC_INSERT=${CLICKHOUSE_WAIT_FOR_ASYNC_INSERT:-true}
      - INDEXER_VERSION=${INDEXER_VERSION:-dev}
      - PYTHONDONTWRITEBYTECODE=1
    command: ["python", "-m", "analytics.scripts.rld_indexer", "worker", "--source", "AAVE_MARKET"]
    labels:
      com.rld.owner: "data-platform"
      com.rld.service: "aave-worker"
      com.rld.tier: "analytics"
      com.rld.persistence: "clickhouse"
      com.rld.description: "Aave market rates worker writing processed analytics rows"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from pathlib import Path; c=Path('/proc/1/cmdline').read_text(); assert 'AAVE_MARKET' in c\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

