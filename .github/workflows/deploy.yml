name: Build & Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Deploy preflight
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Create CI env files
        run: |
          set -euo pipefail
          cp docker/.env.example docker/.env
          cat > backend/analytics/.env <<'ENV'
          MAINNET_RPC_URL=http://localhost:8545
          ENVIO_API_TOKEN=ci
          CLICKHOUSE_PASSWORD=ci_clickhouse_password
          CLICKHOUSE_USER=default
          CLICKHOUSE_API_USER=default
          CLICKHOUSE_API_PASSWORD=ci_clickhouse_password
          CLICKHOUSE_WORKER_USER=default
          CLICKHOUSE_WORKER_PASSWORD=ci_clickhouse_password
          CLICKHOUSE_MIGRATION_USER=default
          CLICKHOUSE_MIGRATION_PASSWORD=ci_clickhouse_password
          ENV

      - name: Validate deployable runtime contracts
        run: |
          set -euo pipefail
          bash -n docker/scripts/stack.sh docker/scripts/generate-status.sh docker/reth/restart-reth.sh
          docker compose -f docker/docker-compose.clickhouse.yml --env-file docker/.env config >/dev/null
          docker compose -f backend/analytics/docker-compose.yml --env-file backend/analytics/.env config >/dev/null
          docker compose -f docker/docker-compose.infra.yml --env-file docker/.env config >/dev/null
          docker compose -f docker/reth/docker-compose.reth.yml --env-file docker/.env config >/dev/null
          docker compose -f docker/docker-compose.frontend.yml --env-file docker/.env config >/dev/null
          docker compose -f docker/docker-compose.docs.yml --env-file docker/.env config >/dev/null

  frontend:
    name: Build frontend artifact
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://rld.fi/api
          VITE_MAINNET_RPC_URL: ${{ secrets.VITE_MAINNET_RPC_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  deploy:
    name: Deploy canonical stack
    needs:
      - preflight
      - frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PASSPHRASE: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          missing=()
          if [ -z "${DEPLOY_HOST:-}" ]; then missing+=("DEPLOY_HOST"); fi
          if [ -z "${DEPLOY_USER:-}" ]; then missing+=("DEPLOY_USER"); fi
          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then missing+=("DEPLOY_SSH_KEY"); fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required deploy secrets: ${missing[*]}"
            exit 1
          fi
          host="$(printf '%s' "${DEPLOY_HOST}" | tr -d '\r\n' | xargs)"
          user="$(printf '%s' "${DEPLOY_USER}" | tr -d '\r\n' | xargs)"
          if [ -z "$host" ] || [ -z "$user" ]; then
            echo "::error::DEPLOY_HOST/DEPLOY_USER resolve to empty after trimming"
            exit 1
          fi
          echo "DEPLOY_HOST=$host" >> "$GITHUB_ENV"
          echo "DEPLOY_USER=$user" >> "$GITHUB_ENV"
          port="${DEPLOY_PORT:-22}"
          port="$(printf '%s' "$port" | tr -d '\r\n' | xargs)"
          if ! [[ "$port" =~ ^[0-9]+$ ]]; then
            echo "::error::DEPLOY_PORT must be numeric (got: '$port')"
            exit 1
          fi
          echo "DEPLOY_PORT=$port" >> "$GITHUB_ENV"

      - name: Prepare SSH key file
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PASSPHRASE: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail
          key_file="$RUNNER_TEMP/deploy_ssh_key"
          printf '%s\n' "$DEPLOY_SSH_KEY" | sed 's/\r$//' > "$key_file"
          chmod 600 "$key_file"
          echo "DEPLOY_SSH_KEY_PATH=$key_file" >> "$GITHUB_ENV"
          if [ -n "${DEPLOY_SSH_PASSPHRASE:-}" ]; then
            ssh-keygen -y -P "$DEPLOY_SSH_PASSPHRASE" -f "$key_file" >/dev/null
          else
            ssh-keygen -y -f "$key_file" >/dev/null
          fi
          ssh-keygen -lf "$key_file" -E sha256

      - name: Add deploy host to known_hosts
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: SSH preflight
        run: |
          set -euo pipefail
          ssh -i "$DEPLOY_SSH_KEY_PATH" -p "$DEPLOY_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o PreferredAuthentications=publickey "$DEPLOY_USER@$DEPLOY_HOST" "echo 'SSH auth OK (key)'"

      - name: Upload frontend artifact
        run: |
          set -euo pipefail
          scp -i "$DEPLOY_SSH_KEY_PATH" -P "$DEPLOY_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -r dist/* "$DEPLOY_USER@$DEPLOY_HOST:/home/ubuntu/RLD/frontend/dist/"

      - name: Deploy changed canonical stacks
        run: |
          set -euo pipefail
          ssh -i "$DEPLOY_SSH_KEY_PATH" -p "$DEPLOY_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o PreferredAuthentications=publickey "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -euo pipefail
          cd /home/ubuntu/RLD
          git fetch origin main
          changed_files="$(git diff --name-only HEAD origin/main || true)"
          git reset --hard origin/main
          docker network create rld_shared >/dev/null 2>&1 || true
          docker compose -f docker/docker-compose.clickhouse.yml --env-file docker/.env config >/dev/null
          docker compose -f backend/analytics/docker-compose.yml --env-file backend/analytics/.env config >/dev/null
          docker compose -f docker/docker-compose.infra.yml --env-file docker/.env config >/dev/null
          docker compose -f docker/reth/docker-compose.reth.yml --env-file docker/.env config >/dev/null
          docker compose -f docker/docker-compose.frontend.yml --env-file docker/.env config >/dev/null
          docker compose -f docker/docker-compose.docs.yml --env-file docker/.env config >/dev/null
          mkdir -p frontend/dist/fonts
          cp frontend/public/fonts.css frontend/dist/fonts.css
          cp frontend/public/fonts/*.woff2 frontend/dist/fonts/
          docker compose -f docker/docker-compose.clickhouse.yml --env-file docker/.env up -d
          if echo "$changed_files" | grep -Eq '^(backend/analytics/|docker/docker-compose.clickhouse.yml|docker/SERVICES.md)'; then
            docker compose -f backend/analytics/docker-compose.yml --env-file backend/analytics/.env up -d --build
          fi
          if echo "$changed_files" | grep -Eq '^(backend/|contracts/|docker/reth/|docker/indexer/|docker/daemons/)'; then
            docker compose -f docker/reth/docker-compose.reth.yml --env-file docker/.env up -d --build
          fi
          if echo "$changed_files" | grep -Eq '^(backend/|docker/docker-compose.infra.yml|docker/SERVICES.md)'; then
            docker compose -f docker/docker-compose.infra.yml --env-file docker/.env up -d --build
          fi
          docker compose -f docker/docker-compose.frontend.yml --env-file docker/.env up -d --no-deps --force-recreate frontend
          if echo "$changed_files" | grep -Eq '^(protocol-docs/|docker/docker-compose.docs.yml|docker/SERVICES.md)'; then
            docker compose -f docker/docker-compose.docs.yml --env-file docker/.env up -d --build
          else
            docker compose -f docker/docker-compose.docs.yml --env-file docker/.env up -d
          fi
          if echo "$changed_files" | grep -Eq '^(docker/dashboard/|docker/scripts/generate-status.sh)'; then
            sudo systemctl restart rld-dashboard-live.service || true
          fi
          bash docker/scripts/generate-status.sh >/dev/null
          bash docker/scripts/stack.sh smoke
          echo "Deploy complete"
          EOF
