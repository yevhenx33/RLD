name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest ruff pip-audit

      - name: Lint backend
        run: ruff check backend

      - name: Run backend tests
        run: |
          if find backend -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest backend
          else
            echo "No backend tests found; skipping pytest."
          fi

      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt

  data-pipeline-tests:
    name: Data pipeline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install data pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r data-pipeline/requirements.txt
          pip install pytest ruff pip-audit

      - name: Lint data pipeline
        run: ruff check data-pipeline/indexer data-pipeline/test_rpc.py data-pipeline/test_vault.py

      - name: Run data pipeline tests
        run: |
          if find data-pipeline -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest data-pipeline
          else
            echo "No data-pipeline tests found; skipping pytest."
          fi

      - name: Audit data pipeline dependencies
        run: pip-audit -r data-pipeline/requirements.txt

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Check frontend architecture boundaries
        run: npm run check:boundaries

      - name: Check frontend bundle budgets
        run: npm run check:bundle

      - name: Run frontend perf smoke checks
        run: npm run check:perf-smoke

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
