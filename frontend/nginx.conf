server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets (hashed filenames — safe to cache forever)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Font files (hashed-content files, cache 1y)
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # fonts.css — NOT immutable (content may change across deploys)
    # Short TTL + must-revalidate so browsers always check for updates
    location = /fonts.css {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }


    # Block sensitive files
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    # ── API Proxies ─────────────────────────────────────────────
    # Resolve via Docker's embedded DNS (needed for variable proxy_pass)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # GraphQL endpoint → indexer container (same Docker network)
    location /graphql {
        set $indexer http://indexer:8080;
        proxy_pass $indexer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rates GraphQL → rates-indexer container
    location /rates-graphql {
        set $rates http://rates-indexer:8080;
        rewrite ^/rates-graphql$ /graphql break;
        proxy_pass $rates;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rates API → rates-indexer container (separate service)
    location /api/rates {
        set $rates http://rates-indexer:8080;
        rewrite ^/api(/.*) $1 break;
        proxy_pass $rates;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Rates WebSocket → rates-indexer container
    location /api/ws/ {
        set $rates http://rates-indexer:8080;
        rewrite ^/api(/.*) $1 break;
        proxy_pass $rates;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Faucet → faucet_server.py on host
    # NOTE: Do NOT use `set $var` here — it forces the Docker DNS resolver
    # (127.0.0.11) which cannot resolve /etc/hosts entries like
    # host.docker.internal. Direct proxy_pass resolves at startup from /etc/hosts.
    location /api/faucet {
        rewrite ^/api/faucet$ /faucet break;
        proxy_pass http://host.docker.internal:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # REST API → indexer container
    location /api/ {
        set $indexer http://indexer:8080;
        proxy_pass $indexer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Anvil RPC → host machine
    location /rpc {
        set $anvil http://host.docker.internal:8545;
        proxy_pass $anvil/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
}
