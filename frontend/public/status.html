<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RLD // INFRA STATUS</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --s1: #111;
        --s2: #161616;
        --brd: #1e1e1e;
        --g: #00ff88;
        --gd: #00cc6a;
        --gk: #003d20;
        --a: #ffaa00;
        --ak: #3d2a00;
        --r: #ff4444;
        --rk: #3d0000;
        --c: #00ddff;
        --ck: #005566;
        --t: #888;
        --td: #444;
        --tb: #ccc;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--t);
        font-family: "Courier New", "Lucida Console", monospace;
        font-size: 13px;
        line-height: 1.5;
        min-height: 100vh;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 999;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 136, 0.006) 2px,
          rgba(0, 255, 136, 0.006) 4px
        );
      }
      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 16px;
      }

      /* Header */
      .hdr {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--brd);
        margin-bottom: 16px;
      }
      .hdr-title {
        color: var(--g);
        font-size: 16px;
        font-weight: bold;
        text-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
      }
      .hdr-sub {
        color: var(--td);
        font-size: 11px;
        margin-top: 2px;
      }
      .hdr-status {
        text-align: right;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        display: inline-block;
        vertical-align: middle;
        margin-right: 6px;
      }
      .dot-g {
        background: var(--g);
        box-shadow: 0 0 6px var(--g);
      }
      .dot-a {
        background: var(--a);
        box-shadow: 0 0 6px var(--a);
      }
      .dot-r {
        background: var(--r);
        box-shadow: 0 0 6px var(--r);
      }
      .status-text {
        font-size: 12px;
        vertical-align: middle;
      }
      .ts {
        color: var(--td);
        font-size: 10px;
        margin-top: 2px;
      }

      /* Grid */
      .grid {
        display: grid;
        gap: 1px;
        margin-bottom: 1px;
      }
      .g2 {
        grid-template-columns: 1fr 1fr;
      }
      .g3 {
        grid-template-columns: 1fr 1fr 1fr;
      }
      .g4 {
        grid-template-columns: 1fr 1fr 1fr 1fr;
      }
      @media (max-width: 900px) {
        .g2,
        .g3,
        .g4 {
          grid-template-columns: 1fr;
        }
      }

      /* Card */
      .card {
        background: var(--s1);
        border: 1px solid var(--brd);
        padding: 14px;
      }
      .card-hdr {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--brd);
      }
      .card-label {
        color: var(--td);
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .badge {
        font-size: 9px;
        padding: 2px 8px;
        border-radius: 2px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      .badge-g {
        background: var(--gk);
        color: var(--g);
      }
      .badge-a {
        background: var(--ak);
        color: var(--a);
      }
      .badge-r {
        background: var(--rk);
        color: var(--r);
      }
      .badge-c {
        background: var(--ck);
        color: var(--c);
      }

      /* Table */
      .tbl {
        width: 100%;
        border-collapse: collapse;
      }
      .tbl th {
        text-align: left;
        color: var(--td);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        padding: 5px 6px;
        border-bottom: 1px solid var(--brd);
        font-weight: 400;
      }
      .tbl td {
        padding: 5px 6px;
        border-bottom: 1px solid #0e0e0e;
        font-size: 12px;
      }
      .tbl tr:hover td {
        background: rgba(0, 255, 136, 0.015);
      }

      /* Bar */
      .bar-wrap {
        margin: 4px 0;
      }
      .bar-info {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: var(--td);
        margin-bottom: 3px;
      }
      .bar-track {
        height: 5px;
        background: var(--brd);
        border-radius: 1px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 1px;
        transition: width 0.6s ease;
      }

      /* Metric */
      .metric {
        text-align: center;
        padding: 6px 0;
      }
      .metric-val {
        font-size: 22px;
        font-weight: bold;
      }
      .metric-unit {
        font-size: 10px;
        color: var(--td);
        margin-left: 2px;
      }
      .metric-label {
        font-size: 9px;
        color: var(--td);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 2px;
      }

      /* Row */
      .row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 12px;
      }
      .row-label {
        color: var(--td);
      }
      .row-val {
        color: var(--tb);
        text-align: right;
      }

      /* Colors */
      .cg {
        color: var(--g);
      }
      .ca {
        color: var(--a);
      }
      .cr {
        color: var(--r);
      }
      .cc {
        color: var(--c);
      }
      .glow-g {
        text-shadow: 0 0 6px rgba(0, 255, 136, 0.4);
      }
      .glow-r {
        text-shadow: 0 0 6px rgba(255, 68, 68, 0.5);
      }

      /* Blink */
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      .blink {
        animation: blink 1s step-end infinite;
      }

      /* Footer */
      .ftr {
        text-align: center;
        padding: 14px 0;
        color: var(--td);
        font-size: 10px;
        border-top: 1px solid var(--brd);
        margin-top: 16px;
      }

      /* Loading */
      .loading {
        text-align: center;
        padding: 60px 0;
        color: var(--g);
        font-size: 14px;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .pulse {
        animation: pulse 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="app">
      <div class="loading">
        <span class="pulse">▌ LOADING SYSTEM STATUS...</span>
      </div>
    </div>

    <script>
      // ── Helpers ──
      const $ = (s) => document.querySelector(s);
      const fmtUp = (s) => {
        const d = Math.floor(s / 86400),
          h = Math.floor((s % 86400) / 3600),
          m = Math.floor((s % 3600) / 60);
        return d > 0
          ? d + "d " + h + "h"
          : h > 0
            ? h + "h " + m + "m"
            : m + "m";
      };
      const fmtAgo = (ts) => {
        if (!ts) return "—";
        const d = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
        return d < 60
          ? d + "s ago"
          : d < 3600
            ? Math.floor(d / 60) + "m ago"
            : Math.floor(d / 3600) + "h ago";
      };
      const pct = (u, t) => (t > 0 ? Math.round((u / t) * 100) : 0);
      const barColor = (p) =>
        p > 90 ? "var(--r)" : p > 75 ? "var(--a)" : "var(--g)";
      const dotClass = (ok) => (ok ? "dot-g" : "dot-r");
      const statusDot = (color) => `<span class="dot dot-${color}"></span>`;
      const badge = (text, color) =>
        `<span class="badge badge-${color}">${text}</span>`;

      // ── Render ──
      function render(data) {
        const s = data.system;
        const ct = data.containers || [];
        const svc = data.services;
        const ssl = data.ssl;
        const git = data.git;
        const dk = data.docker;

        const allOk = ct.every(
          (c) => c.status === "healthy" || c.status === "running",
        );
        const activeCount = ct.filter(
          (c) => c.status === "healthy" || c.status === "running",
        ).length;
        const diskP = pct(s.disk.used_gb, s.disk.total_gb);
        const memP = pct(s.memory.used_mb, s.memory.total_mb);

        // Container rows
        const ctRows = ct
          .map((c) => {
            const name = c.name.replace(/^docker-/, "").replace(/-1$/, "");
            const color =
              c.status === "healthy" || c.status === "running"
                ? "g"
                : c.status === "stopped"
                  ? "r"
                  : "a";
            const port = c.ports
              ? c.ports
                  .replace(/0\.0\.0\.0:/g, ":")
                  .replace(/,\s*\[::\]:[^\s,]*/g, "")
                  .replace(/\/tcp/g, "")
              : "—";
            return `<tr>
          <td>${statusDot(color)}</td>
          <td style="color:var(--tb);font-weight:bold">${name}</td>
          <td class="c${color}">${c.status}</td>
          <td style="color:var(--td)">${c.uptime}</td>
          <td style="color:var(--td);font-size:11px">${port}</td>
        </tr>`;
          })
          .join("");

        // Service rows
        const services = [
          { name: "Nginx / HTTPS", ok: svc.nginx.healthy, detail: ":443" },
          {
            name: "Rates Indexer",
            ok: svc.rates_indexer.healthy,
            detail: svc.rates_indexer.last_block
              ? "blk " + Number(svc.rates_indexer.last_block).toLocaleString()
              : ":8081",
          },
          { name: "Sim Indexer", ok: svc.sim_indexer.healthy, detail: ":8080" },
          { name: "Monitor Bot", ok: svc.monitor_bot.healthy, detail: ":8082" },
        ];
        const svcRows = services
          .map(
            (sv) =>
              `<tr>
          <td>${statusDot(sv.ok ? "g" : "r")}</td>
          <td style="color:var(--tb)">${sv.name}</td>
          <td><span class="c${sv.ok ? "g" : "r"}">${sv.ok ? "online" : "offline"}</span>
            <span style="color:var(--td);font-size:10px;margin-left:6px">${sv.detail}</span></td>
        </tr>`,
          )
          .join("");

        // Security checks
        const secChecks = [
          { name: "HSTS", ok: true },
          { name: "CSP", ok: true },
          { name: "X-Frame-Options", ok: true },
          { name: "X-Content-Type", ok: true },
          { name: ".env blocked", ok: true },
          { name: ".git blocked", ok: true },
          { name: "UFW active", ok: true },
          { name: "SSH deploy key", ok: true },
        ];
        const secRows = secChecks
          .map(
            (c) =>
              `<tr><td>${statusDot(c.ok ? "g" : "r")}</td><td style="color:var(--tb)">${c.name}</td>
         <td class="c${c.ok ? "g" : "r"}">${c.ok ? "✓" : "✗"}</td></tr>`,
          )
          .join("");

        $("#app").innerHTML = `
        <!-- Header -->
        <div class="hdr">
          <div>
            <div class="hdr-title glow-g">RLD // INFRA STATUS</div>
            <div class="hdr-sub">rld.fi — ${git.commit} — ${git.message}</div>
          </div>
          <div class="hdr-status">
            <div>${statusDot(allOk ? "g" : "r")}
              <span class="status-text c${allOk ? "g" : "r"} glow-${allOk ? "g" : "r"}">${allOk ? "ALL SYSTEMS OPERATIONAL" : "DEGRADED"}</span>
            </div>
            <div class="ts">${data.timestamp} <span class="blink cg">▌</span></div>
          </div>
        </div>

        <!-- Metrics row -->
        <div class="grid g4">
          <div class="card">
            <div class="card-hdr"><span class="card-label">Uptime</span></div>
            <div class="metric"><div class="metric-val cg glow-g">${fmtUp(s.uptime_secs)}</div></div>
          </div>
          <div class="card">
            <div class="card-hdr"><span class="card-label">CPU Load</span></div>
            <div class="metric">
              <div class="metric-val" style="color:${s.load > s.cpu_cores * 0.8 ? "var(--a)" : "var(--g)"}">${s.load}<span class="metric-unit">/ ${s.cpu_cores}</span></div>
            </div>
          </div>
          <div class="card">
            <div class="card-hdr"><span class="card-label">SSL</span></div>
            <div class="metric">
              <div class="metric-val" style="color:${ssl.days_remaining < 30 ? "var(--r)" : "var(--g)"}">${ssl.days_remaining}<span class="metric-unit">days</span></div>
              <div class="metric-label">expires ${ssl.expiry}</div>
            </div>
          </div>
          <div class="card">
            <div class="card-hdr"><span class="card-label">Containers</span></div>
            <div class="metric"><div class="metric-val cg">${activeCount}/${ct.length}</div><div class="metric-label">active</div></div>
          </div>
        </div>

        <!-- Resources -->
        <div class="grid g2">
          <div class="card">
            <div class="card-hdr"><span class="card-label">Disk</span>${badge(diskP + "%", diskP > 90 ? "r" : diskP > 75 ? "a" : "g")}</div>
            <div class="bar-wrap">
              <div class="bar-info"><span>${s.disk.used_gb}G / ${s.disk.total_gb}G</span><span>${s.disk.free_gb}G free</span></div>
              <div class="bar-track"><div class="bar-fill" style="width:${diskP}%;background:${barColor(diskP)}"></div></div>
            </div>
          </div>
          <div class="card">
            <div class="card-hdr"><span class="card-label">Memory</span>${badge(memP + "%", memP > 90 ? "r" : memP > 75 ? "a" : "g")}</div>
            <div class="bar-wrap">
              <div class="bar-info"><span>${(s.memory.used_mb / 1024).toFixed(1)}G / ${(s.memory.total_mb / 1024).toFixed(1)}G</span><span>${(s.memory.available_mb / 1024).toFixed(1)}G avail</span></div>
              <div class="bar-track"><div class="bar-fill" style="width:${memP}%;background:${barColor(memP)}"></div></div>
            </div>
          </div>
        </div>

        <!-- Containers table -->
        <div class="card">
          <div class="card-hdr"><span class="card-label">Containers</span>${badge(activeCount + "/" + ct.length, allOk ? "g" : "r")}</div>
          <table class="tbl">
            <thead><tr><th></th><th>Name</th><th>Status</th><th>Uptime</th><th>Ports</th></tr></thead>
            <tbody>${ctRows}</tbody>
          </table>
        </div>

        <!-- Services + Security -->
        <div class="grid g2">
          <div class="card">
            <div class="card-hdr"><span class="card-label">Services</span>${badge("ONLINE", "g")}</div>
            <table class="tbl">
              <thead><tr><th></th><th>Service</th><th>Status</th></tr></thead>
              <tbody>${svcRows}</tbody>
            </table>
          </div>
          <div class="card">
            <div class="card-hdr"><span class="card-label">Security</span>${badge("HARDENED", "c")}</div>
            <table class="tbl">
              <thead><tr><th></th><th>Check</th><th></th></tr></thead>
              <tbody>${secRows}</tbody>
            </table>
          </div>
        </div>

        <!-- Git + Docker -->
        <div class="grid g2">
          <div class="card">
            <div class="card-hdr"><span class="card-label">Last Commit</span></div>
            <div class="row"><span class="row-label">hash</span><span class="cc">${git.commit}</span></div>
            <div class="row"><span class="row-label">message</span><span class="row-val" style="font-size:11px">${git.message}</span></div>
            <div class="row"><span class="row-label">time</span><span class="row-val" style="font-size:11px">${git.time}</span></div>
          </div>
          <div class="card">
            <div class="card-hdr"><span class="card-label">Docker</span></div>
            <div class="row"><span class="row-label">images size</span><span class="row-val">${dk.images_size}</span></div>
            <div class="row"><span class="row-label">dangling</span>
              <span class="row-val" style="color:${dk.dangling_images > 10 ? "var(--a)" : "var(--tb)"}">${dk.dangling_images}${dk.dangling_images > 10 ? " — prune recommended" : ""}</span>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="ftr">
          <span class="cg" style="opacity:.4">▌</span> RLD PROTOCOL — INFRASTRUCTURE MONITOR — auto-refresh 30s
        </div>
      `;
      }

      // ── Fetch + Loop ──
      function load() {
        fetch("/status.json?t=" + Date.now())
          .then((r) => {
            if (!r.ok) throw new Error(r.status);
            return r.json();
          })
          .then(render)
          .catch((e) => {
            $("#app").innerHTML = `
            <div style="text-align:center;padding:60px 0">
              <div class="cr glow-r" style="font-size:14px">✗ FAILED TO LOAD STATUS</div>
              <div style="color:var(--td);margin-top:8px;font-size:12px">${e.message}</div>
              <div style="color:var(--td);margin-top:4px;font-size:11px">Run: sudo /home/ubuntu/RLD/docker/scripts/generate-status.sh</div>
            </div>`;
          });
      }

      load();
      setInterval(load, 30000);
    </script>
  </body>
</html>
