version: '3.8'

services:
  graphql_api:
    image: rld_indexer_node
    container_name: rld_graphql_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CLICKHOUSE_HOST=172.17.0.1
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_CONNECT_TIMEOUT=5
      - CLICKHOUSE_SEND_RECEIVE_TIMEOUT=30
      - CLICKHOUSE_QUERY_RETRIES=1
      - CLICKHOUSE_AUTOGENERATE_SESSION_ID=false
      - INDEXER_READY_PROTOCOLS=AAVE_MARKET,MORPHO_MARKET,CHAINLINK_PRICES
      - CLICKHOUSE_INSERT_BATCH_SIZE=20000
    command:
      [
        "uvicorn",
        "indexer.api.graphql:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--workers",
        "2",
        "--http",
        "h11",
        "--timeout-keep-alive",
        "5",
        "--limit-max-requests",
        "20000",
        "--limit-max-requests-jitter",
        "2000",
        "--limit-concurrency",
        "512"
      ]
    volumes:
      - ./indexer:/app/indexer
    ports:
      - "127.0.0.1:5000:5000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/livez', timeout=2)"
        ]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  aave_collector:
    image: rld_indexer_node
    container_name: rld_aave_collector
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CLICKHOUSE_HOST=172.17.0.1
      - CLICKHOUSE_PORT=8123
      - SEND_MESSAGES=true
      - CLICKHOUSE_CONNECT_TIMEOUT=5
      - CLICKHOUSE_SEND_RECEIVE_TIMEOUT=30
      - CLICKHOUSE_QUERY_RETRIES=1
      - CLICKHOUSE_AUTOGENERATE_SESSION_ID=false
      - CLICKHOUSE_INSERT_BATCH_SIZE=20000
    command: ["python", "/app/scripts/run_indexer.py", "--source", "AAVE_MARKET", "--role", "collector"]
    network_mode: "host"

  aave_processor:
